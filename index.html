const PALETTE = [
  [0, 220, 255],    // cyan
  [180, 100, 255],  // violet
  [255, 60, 120],   // hot pink
  [60, 255, 160],   // mint
  [255, 200, 50],   // amber
  [255, 120, 40],   // orange
  [100, 180, 255],  // sky
];

function rgb(c, a=1) { return `rgba(${c[0]},${c[1]},${c[2]},${a})`; }

class SynthNode {
  constructor(x, y, color, loopBeats, noteDurSec, voiceType, hz, phaseOffsetSec = 0, pressSec = 1) {
    this.x = x; this.y = y;
    this.color = color;
    this.loopBeats  = loopBeats;
    this.loopSec    = loopBeats * masterBeatSec;
    this.noteDurSec = noteDurSec;
    this.voiceType  = voiceType;
    this.hz         = hz;
    this.phaseOffsetSec = phaseOffsetSec;

    // Arpeggio: ALL synth voices arpeggiate -- each gets a unique slot
    // so patterns and intervals differ between nodes
    this.isArp = !PERC_TYPES.includes(voiceType);
    if (this.isArp) {
      this.arpSlot  = arpSlotCounter++;
      // Start with position-derived notes -- updated live in update()
      const nx0 = Math.max(0, Math.min(1, x / W));
      const ny0 = Math.max(0, Math.min(1, y / H));
      this.arpNotes = buildPositionalArp(nx0, ny0);
      this.arpIndex = 0;
      // Store last position used to detect meaningful movement
      this.arpLastNx = nx0;
      this.arpLastNy = ny0;
    }

    // Proximity interaction state
    this.proximityInfluence = 0;
    this._conductorPull     = -1; // -1 = never been touched by conductor
    this.proximityNeighbors = [];
    this.detuneOffset = 0;
    this.gainNode   = null;
    this.filterNode = null;
    this.detuneNode = null;
    this.baseFilterQ  = 3;
    this.baseFilterHz = 400;

    // Synth gain bus for drum-dominance ducking
    if (!PERC_TYPES.includes(voiceType)) {
      this.synthBus = ctx.createGain();
      this.synthBus.gain.value = 0.55;
      this.synthBus.connect(synthBus);
    } else {
      this.synthBus = null;
    }

    // -- POSITIONAL EFFECT -- drums and non-bass synths only
    // Bass node uses position to control melody instead of timbre
    // Drone always gets a tape delay -- saturated feedback path, wow/flutter, near-infinite
    if (voiceType === 'drone') {
      const beat    = masterBeatSec || 0.5;
      const delTimes = [beat * 0.5, beat * 0.75, beat, beat * 1.5, beat * 2];
      const delTime  = delTimes[Math.floor(Math.random() * delTimes.length)];
      // Feedback 0.55-0.82 at spawn -- positional control adjusts from there
      const fbAmt    = 0.55 + Math.random() * 0.27;
      const wetAmt   = 0.50 + Math.random() * 0.30;
      const dryAmt   = 0.55 + Math.random() * 0.25;

      this.fxIn  = ctx.createGain(); this.fxIn.gain.value = 1;
      this.fxOut = ctx.createGain(); this.fxOut.gain.value = 1;
      this.fxOut.connect(this.synthBus || synthBus);

      // Tape delay: saturation in the feedback path colours each repeat
      const delay  = ctx.createDelay(1.0); delay.delayTime.value = delTime;

      // Wow/flutter: modulate delay time via a sum node (iOS Safari doesn't support
      // connecting directly to AudioParam from OscillatorNode in all versions)
      const wowLFO  = ctx.createOscillator(); wowLFO.type = 'sine';
      wowLFO.frequency.value = 0.4 + Math.random() * 0.3;
      const flutLFO = ctx.createOscillator(); flutLFO.type = 'sine';
      flutLFO.frequency.value = 3.5 + Math.random() * 2.5;
      const wowDepth  = ctx.createGain(); wowDepth.gain.value = delTime * 0.001;  // ~0.1% -- barely perceptible
      const flutDepth = ctx.createGain(); flutDepth.gain.value = delTime * 0.0003; // ~0.03% -- just texture
      // Route through a GainNode sum into delayTime AudioParam
      try {
        wowLFO.connect(wowDepth);   wowDepth.connect(delay.delayTime);
        flutLFO.connect(flutDepth); flutDepth.connect(delay.delayTime);
      } catch(e) { /* iOS fallback -- no wow/flutter, delay still works */ }
      wowLFO.start(); flutLFO.start();

      // Tape saturation in feedback path -- each repeat gets warmer/darker
      const tapeSat = ctx.createWaveShaper();
      const tc = new Float32Array(256);
      for (let i = 0; i < 256; i++) {
        const x = (i / 128) - 1;
        tc[i] = Math.tanh(x * 1.6) * 0.85; // soft, warm saturation
      }
      tapeSat.curve = tc;

      // High-frequency rolloff in feedback -- tape loses treble each repeat
      const tapeHPF = ctx.createBiquadFilter(); tapeHPF.type = 'lowpass';
      tapeHPF.frequency.value = 4000 + Math.random() * 2000; // 4-6kHz rolloff
      tapeHPF.Q.value = 0.5;

      const fb  = ctx.createGain(); fb.gain.value = fbAmt;
      const wet = ctx.createGain(); wet.gain.value = wetAmt;
      const dry = ctx.createGain(); dry.gain.value = dryAmt;

      // Path: fxIn -> delay -> tapeSat -> tapeHPF -> fb -> back to delay
      //                     \-> wet -> fxOut
      this.fxIn.connect(dry); dry.connect(this.fxOut);
      this.fxIn.connect(delay);
      delay.connect(tapeSat); tapeSat.connect(tapeHPF);
      tapeHPF.connect(fb); fb.connect(delay); // saturated feedback loop
      tapeHPF.connect(wet); wet.connect(this.fxOut);

      this.fxNodes = { delay, fb, wet, dry, tapeSat, tapeHPF, wowLFO, flutLFO };
      this.fxType  = 'delay';
      this.fxLabel = 'TAPE';

    } else if (voiceType === 'conductor') {
      // Conductor: silent control node -- no audio output, just proximity effects
      this.fxIn  = ctx.createGain(); this.fxIn.gain.value = 0; // silent
      this.fxOut = ctx.createGain(); this.fxOut.gain.value = 0;
      this.fxType  = null;
      this.fxLabel = 'CTRL';

    } else if (!this.isArp) {
      // Pick effect not already in use -- only allow duplicates once all are taken
      const usedEffects = nodes
        .filter(n => n.fxType && POSITIONAL_EFFECT_TYPES.includes(n.fxType))
        .map(n => n.fxType);
      const available = POSITIONAL_EFFECT_TYPES.filter(e => !usedEffects.includes(e));
      const pool = available.length > 0 ? available : POSITIONAL_EFFECT_TYPES;
      this.fxType = pool[Math.floor(Math.random() * pool.length)];
      this.fxIn   = ctx.createGain(); this.fxIn.gain.value = 1;
      this.fxOut  = ctx.createGain(); this.fxOut.gain.value = 1;
      const dest  = PERC_TYPES.includes(voiceType) ? drumBus : (this.synthBus || synthBus);
      this.fxOut.connect(dest);
      this._buildPositionalEffect();
      const FX_LABELS = { overdrive:'OVR', tape:'TAPE', delay:'DLY', distortion:'DST', bitcrusher:'BIT' };
      this.fxLabel = FX_LABELS[this.fxType] || this.fxType.slice(0,3).toUpperCase();
    } else {
      // Bass: gentle overdrive warmth -- soft tanh saturation + low shelf boost
      this.fxIn  = ctx.createGain(); this.fxIn.gain.value = 1;
      this.fxOut = ctx.createGain(); this.fxOut.gain.value = 1;
      this.fxOut.connect(this.synthBus || synthBus);

      const bassSat = ctx.createWaveShaper();
      const bc = new Float32Array(256);
      for (let i = 0; i < 256; i++) {
        const x = (i / 128) - 1;
        bc[i] = Math.tanh(x * 1.8) * 0.82; // warm soft clip, not harsh
      }
      bassSat.curve = bc; bassSat.oversample = '2x';

      // Gentle low shelf to restore warmth lost in saturation
      const bassShelf = ctx.createBiquadFilter();
      bassShelf.type = 'lowshelf';
      bassShelf.frequency.value = 200;
      bassShelf.gain.value = 2.5;

      this.fxIn.connect(bassSat);
      bassSat.connect(bassShelf);
      bassShelf.connect(this.fxOut);

      this.fxType  = null;
      this.fxLabel = 'BASS';
    }

    // Build voice AFTER fxIn exists so drum breaks can route through it
    this.playFn = buildVoice(voiceType, hz, this);
    this.nextFireTime = ctx.currentTime + 0.03;

    // Visual -- size reflects loop length
    // Visual size from raw press duration, mapped to a realistic hold range.
    // Quick tap (0.1s) = small (~16px). Long hold (4s+) = large (~58px).
    // Cube root gives good spread across the short end where most presses land.
    const t = Math.pow(Math.max(0, Math.min(1, (pressSec - 0.1) / 4.0)), 0.4);
    this.baseRadius = 16 + t * 42;
    this.baseRadius = Math.min(Math.max(this.baseRadius, 14), 58);
    this.pulseRadius = this.baseRadius;
    this.pulseAlpha  = 0;
    // Persistent slow-expanding bubble ring -- resets each loop fire
    this.bubbleRing  = this.baseRadius;
    this.bubbleAlpha = 0;
    this.particles   = [];
    this.alive       = true;
  }

  _buildPositionalEffect() {
    // All effects use a compensating output gain to prevent hot signals
    // from driving the bus too hard. Distortion effects get more reduction.
    const dry    = ctx.createGain(); dry.gain.value    = 0.45;
    const compGain = ctx.createGain(); // output level compensator
    this.fxIn.connect(dry); dry.connect(this.fxOut);
    this.fxDry   = dry;
    this.fxCompGain = compGain;
    compGain.connect(this.fxOut);

    if (this.fxType === 'overdrive') {
      // Soft-clip overdrive: warm asymmetric saturation
      // X = drive (soft->hard), Y = tone (dark->bright)
      // Compensator: overdrive adds ~6dB so pull back by half
      compGain.gain.value = 0.45;
      const preGain  = ctx.createGain(); preGain.gain.value = 1.5;
      const shaper   = ctx.createWaveShaper();
      shaper.curve   = makeDistortionCurve(20);
      shaper.oversample = '4x';
      const tone     = ctx.createBiquadFilter();
      tone.type      = 'lowpass'; tone.frequency.value = 4000;
      this.fxIn.connect(preGain); preGain.connect(shaper);
      shaper.connect(tone); tone.connect(compGain);
      this.fxNodes   = { preGain, shaper, tone };

    } else if (this.fxType === 'tape') {
      // Tape compression: subtle saturation + gentle compression + warmth
      // X = saturation amount, Y = compression ratio
      // Compensator: mild, needs little correction
      compGain.gain.value = 0.65;
      const sat    = ctx.createWaveShaper();
      sat.curve    = makeDistortionCurve(5);
      sat.oversample = '2x';
      const comp   = ctx.createDynamicsCompressor();
      comp.threshold.value = -18; comp.knee.value = 8;
      comp.ratio.value     = 3;   comp.attack.value = 0.003;
      comp.release.value   = 0.12;
      const warmth = ctx.createBiquadFilter();
      warmth.type  = 'lowshelf'; warmth.frequency.value = 300; warmth.gain.value = 2;
      this.fxIn.connect(sat); sat.connect(comp); comp.connect(warmth);
      warmth.connect(compGain);
      this.fxNodes = { sat, comp, warmth };

    } else if (this.fxType === 'delay') {
      // Tempo-synced delay with feedback
      // X = delay time, Y = feedback
      // Compensator: delay adds signal, moderate pull-back
      compGain.gain.value = 0.55;
      const beat   = masterBeatSec || 0.5;
      const delay  = ctx.createDelay(2.0); delay.delayTime.value = beat; // quarter note default
      const fb     = ctx.createGain(); fb.gain.value = 0.35;
      const delWet = ctx.createGain(); delWet.gain.value = 0.5;
      this.fxIn.connect(delay);
      delay.connect(fb); fb.connect(delay); // feedback loop
      delay.connect(delWet); delWet.connect(compGain);
      this.fxNodes = { delay, fb, delWet };

    } else if (this.fxType === 'distortion') {
      // Hard distortion: aggressive clipping + resonant filter for character
      // X = amount (gritty->destroyed), Y = filter sweep
      // Compensator: hard clipping needs significant pull-back
      compGain.gain.value = 0.30;
      const preGain  = ctx.createGain(); preGain.gain.value = 2.0;
      const shaper   = ctx.createWaveShaper();
      shaper.curve   = makeDistortionCurve(60);
      shaper.oversample = '4x';
      const rez      = ctx.createBiquadFilter();
      rez.type       = 'bandpass'; rez.frequency.value = 1200; rez.Q.value = 4;
      const rezMix   = ctx.createGain(); rezMix.gain.value = 0.4;
      const dryPass  = ctx.createGain(); dryPass.gain.value = 0.6;
      this.fxIn.connect(preGain); preGain.connect(shaper);
      shaper.connect(dryPass); dryPass.connect(compGain);
      shaper.connect(rez); rez.connect(rezMix); rezMix.connect(compGain);
      this.fxNodes   = { preGain, shaper, rez, rezMix, dryPass };

    } else { // bitcrusher
      // Proper wet/dry bitcrusher with resonant filter
      // X = dry/wet blend (left=clean, right=fully crushed)
      // Y = resonant filter frequency (bottom=dark/rumble, top=bright/fizzy)
      compGain.gain.value = 0.55;

      // Resonant bandpass gives the crushed signal character
      const crushFilt = ctx.createBiquadFilter();
      crushFilt.type = 'bandpass';
      crushFilt.frequency.value = 800;
      crushFilt.Q.value = 3;

      // Waveshaper for quantisation -- start at 6 bits (already gritty)
      const crush = ctx.createWaveShaper();
      crush.curve = makeCrusherCurve(6);
      crush.oversample = 'none';

      // Wet gain -- controls how much crushed signal comes through
      const crushWet = ctx.createGain(); crushWet.gain.value = 0.0; // starts dry

      // Route: fxIn -> crush -> crushFilt -> crushWet -> compGain
      this.fxIn.connect(crush);
      crush.connect(crushFilt);
      crushFilt.connect(crushWet);
      crushWet.connect(compGain);

      this.fxNodes = { crush, crushFilt, crushWet };
    }
  }

  updatePositionalEffect() {
    if (!this.fxNodes || this.fxType === null) return;
    const nx = Math.max(0, Math.min(1, this.x / W));
    const ny = Math.max(0, Math.min(1, this.y / H));

    // Drone tape delay: smooth continuous control, no tempo snapping
    // X: delay time 80ms (left) to 600ms (right) -- smooth, no grid snapping
    // Y: top = high feedback (0.88), bottom = sparse (0.40)
    if (this.voiceType === 'drone') {
      try {
        const delTime = 0.08 + nx * 0.52; // 80ms to 600ms, smooth
        const fb      = 0.88 - ny * 0.48; // 0.88 top to 0.40 bottom
        const wet     = 0.35 + (1 - ny) * 0.30;
        this.fxNodes.delay.delayTime.setTargetAtTime(delTime, ctx.currentTime, 0.3); // slow glide, no jerk
        this.fxNodes.fb.gain.setTargetAtTime(fb,      ctx.currentTime, 0.4);
        this.fxNodes.wet.gain.setTargetAtTime(wet,    ctx.currentTime, 0.3);
      } catch(e) {}
      return;
    }

    try {
      if (this.fxType === 'overdrive') {
        // X: drive 20->120, Y: tone 600->14000Hz
        // Scale compensator inversely with drive so output stays consistent
        const driveAmt = 20 + nx * 100;
        this.fxNodes.shaper.curve = makeDistortionCurve(driveAmt);
        this.fxNodes.preGain.gain.setTargetAtTime(1 + nx * 2, ctx.currentTime, 0.2);
        this.fxNodes.tone.frequency.setTargetAtTime(600 + ny * 13400, ctx.currentTime, 0.2);
        this.fxCompGain.gain.setTargetAtTime(0.5 - nx * 0.25, ctx.currentTime, 0.2);
        this.fxDry.gain.setTargetAtTime(0.75 - nx * 0.4, ctx.currentTime, 0.3);

      } else if (this.fxType === 'tape') {
        // X: saturation 2->25, Y: compression ratio 2->8
        const satAmt = 2 + nx * 23;
        this.fxNodes.sat.curve = makeDistortionCurve(satAmt);
        this.fxNodes.comp.ratio.setTargetAtTime(2 + ny * 6, ctx.currentTime, 0.3);
        this.fxNodes.comp.threshold.setTargetAtTime(-10 - ny * 20, ctx.currentTime, 0.3);
        this.fxNodes.warmth.gain.setTargetAtTime(nx * 6, ctx.currentTime, 0.4);
        this.fxCompGain.gain.setTargetAtTime(0.7 - nx * 0.2, ctx.currentTime, 0.3);

      } else if (this.fxType === 'delay') {
        // X: snap to musical subdivision of current tempo
        // subdivisions: 1/8, dotted 1/8, 1/4, dotted 1/4, 1/2, dotted 1/2, whole
        const beat = masterBeatSec || 0.5;
        const subdivisions = [
          beat * 0.25,       // 16th note
          beat * 0.375,      // dotted 16th
          beat * 0.5,        // 8th note
          beat * 0.75,       // dotted 8th
          beat * 1.0,        // quarter note
          beat * 1.5,        // dotted quarter
          beat * 2.0,        // half note
        ];
        const subIdx  = Math.min(subdivisions.length - 1, Math.floor(nx * subdivisions.length));
        const delTime = subdivisions[subIdx];
        this.fxNodes.delay.delayTime.setTargetAtTime(delTime, ctx.currentTime, 0.05);
        this.fxNodes.fb.gain.setTargetAtTime(0.05 + ny * 0.73, ctx.currentTime, 0.2);
        this.fxNodes.delWet.gain.setTargetAtTime(0.2 + nx * 0.55, ctx.currentTime, 0.3);
        this.fxDry.gain.setTargetAtTime(0.75 - nx * 0.35, ctx.currentTime, 0.3);

      } else if (this.fxType === 'distortion') {
        // X: amount 30->200, Y: resonant filter 200->6000Hz
        const distAmt = 30 + nx * 170;
        this.fxNodes.shaper.curve = makeDistortionCurve(distAmt);
        this.fxNodes.preGain.gain.setTargetAtTime(1.5 + nx * 3, ctx.currentTime, 0.2);
        this.fxNodes.rez.frequency.setTargetAtTime(200 + ny * 5800, ctx.currentTime, 0.2);
        this.fxNodes.rez.Q.setTargetAtTime(2 + ny * 10, ctx.currentTime, 0.3);
        // More drive = more output reduction to compensate
        this.fxCompGain.gain.setTargetAtTime(0.35 - nx * 0.15, ctx.currentTime, 0.2);
        this.fxDry.gain.setTargetAtTime(0.75 - nx * 0.5, ctx.currentTime, 0.3);

      } else { // bitcrusher
        // X: wet blend 0->1 (left=dry, right=fully crushed)
        // Y: filter frequency bottom=200Hz (dark rumble) to top=8000Hz (fizzy)
        const wetAmt = nx;
        const bits   = Math.max(1, Math.round(6 - nx * 5)); // 6 bits down to 1 bit
        // Only rebuild curve when bits value actually changes
        const newBits = bits;
        if (this._lastCrushBits !== newBits) {
          this.fxNodes.crush.curve = makeCrusherCurve(newBits);
          this._lastCrushBits = newBits;
        }
        this.fxNodes.crushWet.gain.setTargetAtTime(wetAmt * 0.9, ctx.currentTime, 0.1);
        this.fxNodes.crushFilt.frequency.setTargetAtTime(200 + (1 - ny) * 7800, ctx.currentTime, 0.15);
        this.fxNodes.crushFilt.Q.setTargetAtTime(1 + nx * 8, ctx.currentTime, 0.2);
        this.fxDry.gain.setTargetAtTime(1 - nx * 0.6, ctx.currentTime, 0.1); // dry fades as wet increases
        this.fxCompGain.gain.setTargetAtTime(0.6 - nx * 0.2, ctx.currentTime, 0.15);
      }
    } catch(e) {}
  }

  fire(time) {
    if (this.isArp) {
      const beat  = masterBeatSec || 0.5;
      const step  = beat * 0.5; // always 8th notes

      // Track loop count for variation
      this._arpLoopCount = (this._arpLoopCount || 0) + 1;
      const loopInCycle  = ((this._arpLoopCount - 1) % 4); // 0,1,2,3

      const nx = Math.max(0, Math.min(1, this.x / W));
      const ny = Math.max(0, Math.min(1, this.y / H));

      let notes;
      if (loopInCycle === 3) {
        // Loop 4: variation -- build from a neighbouring zone (shift nx by 0.25)
        // giving a different pattern shape but same register/key
        const varNx = (nx + 0.3) % 1.0;
        notes = buildPositionalArp(varNx, ny);
      } else {
        // Loops 1-3: main phrase
        notes = this.arpNotes;
      }

      const count = notes.length;

      // Loop length = exactly one full phrase
      this.loopSec = count * step;

      // Clear stale scheduled events from previous loop
      try {
        if (this._bassOscs) this._bassOscs.forEach(o => o.frequency.cancelScheduledValues(time));
        if (this._bassNodes) {
          this._bassNodes.ampEnv.gain.cancelScheduledValues(time);
          this._bassNodes.filt.frequency.cancelScheduledValues(time);
          this._bassNodes.filt2.frequency.cancelScheduledValues(time);
        }
      } catch(e) {}

      for (let i = 0; i < count; i++) {
        const noteTime = time + i * step;
        const hz = notes[i];
        try { this.playFn(noteTime, step * 0.92, hz); } catch(e) {}
        this._pingArpNote(noteTime, i);
      }
    } else if (PERC_TYPES.includes(this.voiceType)) {
      // Cut the previous loop immediately by fading its output gain to zero
      if (this._drumOutGain) {
        try {
          this._drumOutGain.gain.cancelScheduledValues(ctx.currentTime);
          this._drumOutGain.gain.setTargetAtTime(0, ctx.currentTime, 0.015);
        } catch(e) {}
      }
      try { this.playFn(time, this.loopSec, this.hitDensity || 1.0, this); } catch(e) {}
      this.pingVisual(time);
    } else {
      try { this.playFn(time, this.noteDurSec); } catch(e) {}
      this.pingVisual(time);
    }
  }

  _pingArpNote(scheduledTime, noteIdx) {
    const delay = Math.max(0, (scheduledTime - ctx.currentTime) * 1000);
    setTimeout(() => {
      this._activeArpIdx = noteIdx;
      this.pulseRadius = this.baseRadius;
      this.pulseAlpha  = 1;
      this.bubbleRing  = this.baseRadius;
      this.bubbleAlpha = 0.55;
    }, delay);
  }

  pingVisual(scheduledTime) {
    const delay = Math.max(0, (scheduledTime - ctx.currentTime) * 1000);
    setTimeout(() => {
      this.pulseRadius = this.baseRadius;
      this.pulseAlpha  = 1;
      // Reset bubble ring -- expands slowly until next fire
      this.bubbleRing  = this.baseRadius;
      this.bubbleAlpha = 0.55;
      for (let i = 0; i < 6; i++) {
        const a = Math.random() * Math.PI * 2;
        const spd = 0.8 + Math.random() * 1.5;
        this.particles.push({
          x: this.x, y: this.y,
          vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
          life: 1, decay: 0.04 + Math.random() * 0.04,
          r: 1.5 + Math.random() * 2
        });
      }
    }, delay);
  }

  update() {
    // Bubble ring expands slowly from baseRadius, fades gradually
    if (this.bubbleAlpha > 0) {
      const maxRing = this.baseRadius + 60; // cap so it doesn't expand forever
      if (this.bubbleRing < maxRing) {
        this.bubbleRing += 0.4;
      } else {
        // Once at max, just fade
        this.bubbleAlpha -= 0.008;
      }
      this.bubbleAlpha -= 0.002; // always fading too
      if (this.bubbleAlpha < 0) this.bubbleAlpha = 0;
    }

    // Bass: rebuild melody from screen position whenever node moves
    if (this.isArp && W > 0 && H > 0) {
      const nx = Math.max(0, Math.min(1, this.x / W));
      const ny = Math.max(0, Math.min(1, this.y / H));
      const dx = Math.abs(nx - this.arpLastNx);
      const dy = Math.abs(ny - this.arpLastNy);
      if (dx > 0.005 || dy > 0.005) {
        this.arpNotes  = buildPositionalArp(nx, ny);
        this.arpLastNx = nx;
        this.arpLastNy = ny;
      }
    }

    // Expand pulse
    if (this.pulseAlpha > 0) {
      this.pulseRadius += 2.5;
      this.pulseAlpha -= 0.018;
    }
    // Update particles
    this.particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.97; p.vy *= 0.97;
      p.life -= p.decay;
    });
    this.particles = this.particles.filter(p => p.life > 0);
  }

  draw() {
    const c = this.color;
    gfx.save();

    // -- BUBBLE RINGS: trim arc angles so rings meet cleanly at flat walls --
    // For each neighbouring node we compute the angle range on THIS ring
    // that falls in the OTHER node's territory, and exclude it.
    // A flat wall line connects the two arc endpoints exactly.

    const drawBubbleRing = (ringR, alpha, lineW) => {
      if (alpha <= 0 || ringR <= 0) return;

      const exclusions = [];
      nodes.forEach(other => {
        if (other === this) return;
        const dx   = other.x - this.x;
        const dy   = other.y - this.y;
        const dist = Math.hypot(dx, dy);
        if (dist < 1 || dist > ringR + other.baseRadius * 2) return;

        const tBound    = this.baseRadius / (this.baseRadius + other.baseRadius);
        const boundDist = dist * tBound;
        if (ringR <= boundDist) return;

        const angleToOther = Math.atan2(dy, dx);
        const cosHalf      = boundDist / ringR;
        if (cosHalf >= 1) return;
        const halfAngle = Math.acos(Math.max(-1, Math.min(1, cosHalf)));
        if (!isFinite(halfAngle)) return;
        exclusions.push({ angleToOther, halfAngle });
      });

      if (exclusions.length === 0) {
        gfx.beginPath();
        gfx.arc(this.x, this.y, ringR, 0, Math.PI * 2);
        gfx.strokeStyle = rgb(c, alpha);
        gfx.lineWidth   = lineW;
        gfx.stroke();
        return;
      }

      const ranges = exclusions.map(e => ({
        a0: e.angleToOther - e.halfAngle,
        a1: e.angleToOther + e.halfAngle
      }));
      ranges.sort((a, b) => a.a0 - b.a0);

      for (let i = 0; i < ranges.length; i++) {
        const cur     = ranges[i];
        const next    = ranges[(i + 1) % ranges.length];
        const arcStart = cur.a1;
        const arcEnd   = i < ranges.length - 1 ? next.a0 : ranges[0].a0 + Math.PI * 2;

        if (isFinite(arcStart) && isFinite(arcEnd) && arcEnd > arcStart + 0.01) {
          gfx.beginPath();
          gfx.arc(this.x, this.y, ringR, arcStart, arcEnd);
          gfx.strokeStyle = rgb(c, alpha);
          gfx.lineWidth   = lineW;
          gfx.stroke();
        }

        // Flat wall connecting arc endpoints
        const p1x = this.x + Math.cos(cur.a0) * ringR;
        const p1y = this.y + Math.sin(cur.a0) * ringR;
        const p2x = this.x + Math.cos(cur.a1) * ringR;
        const p2y = this.y + Math.sin(cur.a1) * ringR;
        if (isFinite(p1x) && isFinite(p1y) && isFinite(p2x) && isFinite(p2y)) {
          gfx.beginPath();
          gfx.moveTo(p1x, p1y);
          gfx.lineTo(p2x, p2y);
          gfx.strokeStyle = rgb(c, alpha * 0.8);
          gfx.lineWidth   = lineW;
          gfx.stroke();
        }
      }
    };

    if (this.pulseAlpha > 0) {
      drawBubbleRing(this.pulseRadius, this.pulseAlpha * 0.7, 2);
    }
    if (this.bubbleAlpha > 0) {
      drawBubbleRing(this.bubbleRing, this.bubbleAlpha, 1.2);
    }

    // Conductor: octopus -- soft body with writhing tentacles
    // One tentacle latches onto each nearby drum node
    if (this.voiceType === 'conductor') {
      const r   = this.baseRadius;
      const t   = Date.now() / 1000;
      const CONDUCTOR_RADIUS = 120;

      // Initialise per-tentacle phase offsets once
      if (!this._tentPhase) {
        this._tentPhase = Array.from({length: 8}, (_, i) => i * Math.PI * 2 / 8 + Math.random() * 0.5);
      }

      // Soft outer glow
      const oGrad = gfx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 2.5);
      oGrad.addColorStop(0, rgb(c, 0.18)); oGrad.addColorStop(1, rgb(c, 0));
      gfx.beginPath(); gfx.arc(this.x, this.y, r * 2.5, 0, Math.PI * 2);
      gfx.fillStyle = oGrad; gfx.fill();

      // Find drums within range for tentacle attachment
      const attachedDrums = nodes.filter(n =>
        PERC_TYPES.includes(n.voiceType) &&
        n.voiceType !== 'conductor' &&
        Math.hypot(n.x - this.x, n.y - this.y) < CONDUCTOR_RADIUS
      );

      // Draw tentacles -- 8 total, some free-writhing, some latching to drums
      const NUM_TENTACLES = 8;
      for (let i = 0; i < NUM_TENTACLES; i++) {
        const baseAngle = (i / NUM_TENTACLES) * Math.PI * 2 + this._tentPhase[i];
        // Slow idle writhe
        const writhAngle = baseAngle + Math.sin(t * 0.9 + i * 1.3) * 0.35;

        // Check if this tentacle is claimed by a nearby drum
        const drum = attachedDrums[i % attachedDrums.length];
        const isAttached = attachedDrums.length > 0 && i < attachedDrums.length;

        // Tentacle root on body edge
        const rootX = this.x + Math.cos(writhAngle) * r * 0.7;
        const rootY = this.y + Math.sin(writhAngle) * r * 0.7;

        let tipX, tipY, cp1x, cp1y, cp2x, cp2y;

        if (isAttached && drum) {
          // Latch tentacle: tip reaches exactly to drum center
          const dx = drum.x - this.x, dy = drum.y - this.y;
          const dist = Math.hypot(dx, dy);
          tipX = drum.x;
          tipY = drum.y;
          const perp = { x: -dy / dist, y: dx / dist };
          const wave = Math.sin(t * 1.2 + i) * 18;
          cp1x = rootX + (dx / dist) * dist * 0.3 + perp.x * wave;
          cp1y = rootY + (dy / dist) * dist * 0.3 + perp.y * wave;
          cp2x = tipX  - (dx / dist) * dist * 0.2 + perp.x * wave * 0.5;
          cp2y = tipY  - (dy / dist) * dist * 0.2 + perp.y * wave * 0.5;

          // Glow at attachment point
          gfx.beginPath();
          gfx.arc(tipX, tipY, 4 + Math.sin(t * 3 + i) * 1.5, 0, Math.PI * 2);
          gfx.fillStyle = rgb(c, 0.7 + Math.sin(t * 4) * 0.2);
          gfx.fill();
        } else {
          // Free-writhing tentacle -- curls in space
          const tentLen = r * (1.8 + Math.sin(t * 0.7 + i * 2.1) * 0.4);
          tipX = rootX + Math.cos(writhAngle + Math.sin(t * 0.8 + i) * 0.6) * tentLen;
          tipY = rootY + Math.sin(writhAngle + Math.sin(t * 0.8 + i) * 0.6) * tentLen;
          const curl = Math.sin(t * 1.1 + i * 1.7) * 20;
          cp1x = rootX + Math.cos(writhAngle + 0.3) * tentLen * 0.4 + curl;
          cp1y = rootY + Math.sin(writhAngle + 0.3) * tentLen * 0.4 - curl;
          cp2x = tipX  - Math.cos(writhAngle) * tentLen * 0.2 - curl * 0.5;
          cp2y = tipY  - Math.sin(writhAngle) * tentLen * 0.2 + curl * 0.5;
        }

        // Draw tentacle as tapered bezier
        const tentAlpha = isAttached ? 0.75 : 0.45;
        gfx.beginPath();
        gfx.moveTo(rootX, rootY);
        gfx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, tipX, tipY);
        gfx.strokeStyle = rgb(c, tentAlpha);
        gfx.lineWidth   = isAttached ? 2.5 : 1.5;
        gfx.lineCap     = 'round';
        gfx.stroke();
      }

      // Central soft body -- slightly pulsing
      const pulse = 1 + Math.sin(t * 2.1) * 0.06;
      const bGrad = gfx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * pulse);
      bGrad.addColorStop(0,   rgb(c, 0.95));
      bGrad.addColorStop(0.5, rgb(c, 0.55));
      bGrad.addColorStop(1,   rgb(c, 0.05));
      gfx.beginPath(); gfx.arc(this.x, this.y, r * pulse, 0, Math.PI * 2);
      gfx.fillStyle = bGrad; gfx.fill();

      // Label
      gfx.font = '8px "Share Tech Mono", monospace';
      gfx.fillStyle = rgb(c, 0.45); gfx.textAlign = 'center';
      gfx.fillText('CTRL', this.x, this.y + r * 1.4 + 10);

      // Particles
      this.particles.forEach(p => {
        gfx.beginPath(); gfx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        gfx.fillStyle = rgb(c, p.life * 0.8); gfx.fill();
      });
      gfx.restore();
      return;
    }

    // -- BASS ARP: segmented ring showing arp position --
    if (this.voiceType === 'doublesawbass') {
      const r   = this.baseRadius;
      const seg = this.arpNotes ? this.arpNotes.length : 4;
      const gap = 0.08;
      const arc = (Math.PI * 2 / seg) - gap;
      const activeIdx = (this._activeArpIdx !== undefined) ? this._activeArpIdx % seg : 0;

      // Outer glow
      const bGrad = gfx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 2.8);
      bGrad.addColorStop(0, rgb(c, 0.18)); bGrad.addColorStop(1, rgb(c, 0));
      gfx.beginPath(); gfx.arc(this.x, this.y, r * 2.8, 0, Math.PI * 2);
      gfx.fillStyle = bGrad; gfx.fill();

      // Core circle
      const bCore = gfx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r);
      bCore.addColorStop(0, rgb(c, 0.85)); bCore.addColorStop(0.5, rgb(c, 0.5)); bCore.addColorStop(1, rgb(c, 0.04));
      gfx.beginPath(); gfx.arc(this.x, this.y, r, 0, Math.PI * 2);
      gfx.fillStyle = bCore; gfx.fill();

      // Inner bright dot
      gfx.beginPath(); gfx.arc(this.x, this.y, r * 0.22, 0, Math.PI * 2);
      gfx.fillStyle = rgb(c, 0.95); gfx.fill();

      // Segmented ring -- segments at r*1.45, active segment glows bright
      const ringR = r * 1.5;
      for (let i = 0; i < seg; i++) {
        const startA = -Math.PI / 2 + i * (Math.PI * 2 / seg) + gap / 2;
        const isActive = (i === activeIdx);
        gfx.beginPath();
        gfx.arc(this.x, this.y, ringR, startA, startA + arc);
        gfx.strokeStyle = rgb(c, isActive ? 0.95 : 0.22);
        gfx.lineWidth   = isActive ? 3 : 1.5;
        gfx.stroke();
      }

      // Label
      gfx.font = '8px "Share Tech Mono", monospace';
      gfx.fillStyle = rgb(c, 0.5); gfx.textAlign = 'center';
      const bLabel = this.loopBeats < 1 ? '1/' + Math.round(1/this.loopBeats) : this.loopBeats + 'b';
      gfx.fillText(bLabel + ' . BASS', this.x, this.y + ringR + 10);

      // Particles
      this.particles.forEach(p => {
        gfx.beginPath(); gfx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        gfx.fillStyle = rgb(c, p.life * 0.8); gfx.fill();
      });
      gfx.restore();
      return;
    }

    // -- DRONE: soft core with slow rotating outer ring --
    if (this.voiceType === 'drone') {
      const r = this.baseRadius;
      if (!this._spinAngle) this._spinAngle = 0;
      this._spinAngle += 0.004; // very slow rotation

      // Wide soft glow -- breathes subtly
      const dGlow = gfx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 3.2);
      dGlow.addColorStop(0, rgb(c, 0.14)); dGlow.addColorStop(1, rgb(c, 0));
      gfx.beginPath(); gfx.arc(this.x, this.y, r * 3.2, 0, Math.PI * 2);
      gfx.fillStyle = dGlow; gfx.fill();

      // Soft filled core -- no hard edge, very gradual
      const dCore = gfx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 1.2);
      dCore.addColorStop(0,   rgb(c, 0.80));
      dCore.addColorStop(0.5, rgb(c, 0.40));
      dCore.addColorStop(1,   rgb(c, 0));
      gfx.beginPath(); gfx.arc(this.x, this.y, r * 1.2, 0, Math.PI * 2);
      gfx.fillStyle = dCore; gfx.fill();

      // Slow rotating arc ring -- a single long arc that orbits the node
      const ringR = r * 1.6;
      const arcLen = Math.PI * 1.4; // 70% of circle
      gfx.beginPath();
      gfx.arc(this.x, this.y, ringR, this._spinAngle, this._spinAngle + arcLen);
      gfx.strokeStyle = rgb(c, 0.55);
      gfx.lineWidth   = 1.5;
      gfx.stroke();

      // Opposite shorter arc for balance
      gfx.beginPath();
      gfx.arc(this.x, this.y, ringR, this._spinAngle + Math.PI, this._spinAngle + Math.PI + arcLen * 0.4);
      gfx.strokeStyle = rgb(c, 0.25);
      gfx.lineWidth   = 1;
      gfx.stroke();

      // Label
      gfx.font = '8px "Share Tech Mono", monospace';
      gfx.fillStyle = rgb(c, 0.45); gfx.textAlign = 'center';
      gfx.fillText('DRONE . TAPE', this.x, this.y + ringR + 10);

      // Particles
      this.particles.forEach(p => {
        gfx.beginPath(); gfx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        gfx.fillStyle = rgb(c, p.life * 0.8); gfx.fill();
      });
      gfx.restore();
      return;
    }

    // Outer soft glow
    const grad = gfx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.baseRadius * 2.5);
    grad.addColorStop(0, rgb(c, 0.15));
    grad.addColorStop(1, rgb(c, 0));
    gfx.beginPath();
    gfx.arc(this.x, this.y, this.baseRadius * 2.5, 0, Math.PI * 2);
    gfx.fillStyle = grad;
    gfx.fill();

    // Core circle
    const coreGrad = gfx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.baseRadius);
    coreGrad.addColorStop(0, rgb(c, 0.9));
    coreGrad.addColorStop(0.4, rgb(c, 0.6));
    coreGrad.addColorStop(1, rgb(c, 0.05));
    gfx.beginPath();
    gfx.arc(this.x, this.y, this.baseRadius, 0, Math.PI * 2);
    gfx.fillStyle = coreGrad;
    gfx.fill();

    // Inner bright dot
    gfx.beginPath();
    gfx.arc(this.x, this.y, this.baseRadius * 0.25, 0, Math.PI * 2);
    gfx.fillStyle = rgb(c, 0.95);
    gfx.fill();

    // Loop length + effect label
    gfx.font = '8px "Share Tech Mono", monospace';
    gfx.fillStyle = rgb(c, 0.5);
    gfx.textAlign = 'center';
    const loopLabel = this.loopBeats < 1
      ? '1/' + Math.round(1/this.loopBeats)
      : this.loopBeats + 'b';
    gfx.fillText(loopLabel + ' . ' + (this.fxLabel || ''), this.x, this.y + this.baseRadius + 14);

    // Particles
    this.particles.forEach(p => {
      gfx.beginPath();
      gfx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      gfx.fillStyle = rgb(c, p.life * 0.8);
      gfx.fill();
    });

    gfx.restore();
  }
}

// Active touch growing circles -- expand while held, size reflects loop length
class GrowingCircle {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    this.color = color;
    this.radius = 6;
    this.maxRadius = Math.min(W, H) * 0.42;
    this.alive = true;
    this.released = false;
    this.releaseAlpha = 1;
  }

  grow(holdSec) {
    // Radius grows with sqrt of hold time for natural feel, caps at maxRadius
    this.radius = 6 + Math.sqrt(holdSec) * 80;
    this.radius = Math.min(this.radius, this.maxRadius);
  }

  release() {
    this.released = true;
  }

  update() {
    if (this.released) {
      this.releaseAlpha -= 0.04;
      if (this.releaseAlpha <= 0) this.alive = false;
    }
  }

  draw() {
    const alpha = this.released
      ? this.releaseAlpha * 0.4
      : 0.55;
    gfx.beginPath();
    gfx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    gfx.strokeStyle = rgb(this.color, alpha);
    gfx.lineWidth = this.released ? 1 : 1.5;
    gfx.stroke();

    // Inner fill when held
    if (!this.released) {
      const fill = gfx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
      fill.addColorStop(0, rgb(this.color, 0.06));
      fill.addColorStop(1, rgb(this.color, 0));
      gfx.beginPath();
      gfx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      gfx.fillStyle = fill;
      gfx.fill();
    }
  }
}

let growingCircles = [];
let connections = [];

const PROXIMITY_RADIUS = 160; // px -- tighter interaction zone

function updateProximity() {
  if (nodes.length < 2) return;

  // Reset all nodes' proximity state
  nodes.forEach(n => {
    n.proximityInfluence = 0;  // 0..1, sum of all neighbor pulls
    n.proximityNeighbors = []; // list of { node, influence }
  });

  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      const dist = Math.hypot(a.x - b.x, a.y - b.y);
      if (dist >= PROXIMITY_RADIUS) continue;

      const inf = 1 - dist / PROXIMITY_RADIUS; // 0..1, stronger when closer
      a.proximityInfluence = Math.min(1, a.proximityInfluence + inf);
      b.proximityInfluence = Math.min(1, b.proximityInfluence + inf);
      a.proximityNeighbors.push({ node: b, inf });
      b.proximityNeighbors.push({ node: a, inf });

      // -- EFFECT 1: PITCH DRIFT ------------------------------------------
      // Synth nodes slowly detune toward each other -- creates beating/chorus.
      // Applied gradually so it feels organic, not snappy.
      const isSynthA = !PERC_TYPES.includes(a.voiceType);
      const isSynthB = !PERC_TYPES.includes(b.voiceType);
      if (isSynthA && isSynthB && a.detuneNode && b.detuneNode) {
        const pull = inf * 8; // max +/-8 cents of mutual pull
        const aTarget = (b.hz - a.hz > 0 ? 1 : -1) * pull;
        const bTarget = -aTarget;
        a.detuneOffset = a.detuneOffset * 0.97 + aTarget * 0.03;
        b.detuneOffset = b.detuneOffset * 0.97 + bTarget * 0.03;
        try { a.detuneNode.detune.setTargetAtTime(a.detuneOffset, ctx.currentTime, 0.1); } catch(e) {}
        try { b.detuneNode.detune.setTargetAtTime(b.detuneOffset, ctx.currentTime, 0.1); } catch(e) {}
      }

      // -- EFFECT 2: FILTER RESONANCE boost -- handled per-node below
    }
  }

  // Filter resonance on bass: driven by conductor proximity, not drums
  // Find conductor and bass nodes
  const conductor = nodes.find(n => n.voiceType === 'conductor');
  const bassNodes = nodes.filter(n => n.voiceType === 'doublesawbass');

  bassNodes.forEach(bass => {
    if (!bass.filterNode) return;
    let inf = 0;
    if (conductor) {
      const dist = Math.hypot(conductor.x - bass.x, conductor.y - bass.y);
      const COND_FILTER_RADIUS = 120;
      if (dist < COND_FILTER_RADIUS) {
        inf = Math.pow(1 - dist / COND_FILTER_RADIUS, 1.5); // stronger when close
      }
    }
    // Store on bass node so play() can use it for per-note Q boost too
    bass.proximityInfluence = inf;
    const targetQ  = bass.baseFilterQ  + inf * 14; // wide resonance peak when close
    const targetHz = bass.baseFilterHz + inf * 1200; // filter opens up significantly
    try {
      bass.filterNode.Q.setTargetAtTime(targetQ,  ctx.currentTime, 0.2);
      bass.filterNode.frequency.setTargetAtTime(targetHz, ctx.currentTime, 0.2);
    } catch(e) {}
  });
}

function drawBubbleBoundaries() {
  if (nodes.length < 2) return;

  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      const dist = Math.hypot(a.x - b.x, a.y - b.y);

      // Bubbles only form a shared wall when they overlap or are very close
      const sumR  = a.baseRadius + b.baseRadius;
      if (dist > sumR * 1.6) continue;

      // Plateau boundary position: weighted by radius (larger bubble wins more space)
      // t=0 means boundary at a's center, t=1 at b's center
      const t = a.baseRadius / (a.baseRadius + b.baseRadius);
      const bx = a.x + (b.x - a.x) * t;
      const by = a.y + (b.y - a.y) * t;

      // Perpendicular direction to the line between centers
      const dx = b.x - a.x, dy = b.y - a.y;
      const len = Math.hypot(dx, dy) || 1;
      const px = -dy / len, py = dx / len; // perpendicular unit vector

      // Wall length scales with how much they overlap
      const overlap = Math.max(0, 1 - dist / sumR);
      const wallLen = Math.min(a.baseRadius, b.baseRadius) * (0.8 + overlap * 1.2);

      // Fade based on distance -- closer = more opaque
      const alpha = Math.min(0.7, overlap * 1.5 + 0.15);

      // Draw the flat boundary wall -- blend the two node colors
      gfx.beginPath();
      gfx.moveTo(bx - px * wallLen, by - py * wallLen);
      gfx.lineTo(bx + px * wallLen, by + py * wallLen);

      // Gradient along the wall from a's color to b's color
      const grad = gfx.createLinearGradient(
        bx - px * wallLen, by - py * wallLen,
        bx + px * wallLen, by + py * wallLen
      );
      grad.addColorStop(0,   rgb(a.color, alpha));
      grad.addColorStop(0.5, rgb(a.color, alpha * 0.6));
      grad.addColorStop(0.5, rgb(b.color, alpha * 0.6));
      grad.addColorStop(1,   rgb(b.color, alpha));

      gfx.strokeStyle = grad;
      gfx.lineWidth   = 1.5 + overlap * 2;
      gfx.stroke();

      // Small bright dot at the junction point (triple point feel)
      gfx.beginPath();
      gfx.arc(bx, by, 2 + overlap * 2, 0, Math.PI * 2);
      gfx.fillStyle = rgb(a.color, alpha * 0.8);
      gfx.fill();
    }
  }
}

function updateConductor() {
  const conductors = nodes.filter(n => n.voiceType === 'conductor');
  if (conductors.length === 0) return;
  if (!masterOriginTime) return;
  const now  = ctx.currentTime;
  const beat = masterBeatSec || 0.5;
  const CONDUCTOR_RADIUS = 120; // tight -- must be deliberately placed on a drum

  // Musical subdivisions from fastest to slowest
  const SUBDIVISIONS = [
    beat * 0.0625,// 64th note
    beat * 0.125, // 32nd note
    beat * 0.25,  // 16th note
    beat * 0.5,   // 8th note
    beat * 1,     // quarter
    beat * 2,     // half note
    beat * 4,     // whole note
    beat * 8,     // 2 bars
  ];

  conductors.forEach(cond => {
    nodes.forEach(drum => {
      if (!PERC_TYPES.includes(drum.voiceType)) return;
      if (drum.voiceType === 'conductor') return;

      // Initialise pull state on first encounter so snap-back never fires spuriously
      if (drum._conductorPull === undefined) drum._conductorPull = -1;

      const dist = Math.hypot(cond.x - drum.x, cond.y - drum.y);

      if (dist >= CONDUCTOR_RADIUS) {
        // Only snap back if we were actively pulling this drum (pull > 0)
        if (drum._conductorPull > 0) {
          drum._conductorPull = 0;
          // Restore drum to its own loop grid anchored at its original first-fire phase
          const anchor  = masterOriginTime + (drum.phaseOffsetSec || 0);
          const elapsed = now - anchor;
          const cyclesSoFar = Math.floor(elapsed / drum.loopSec);
          let nextNatural = anchor + (cyclesSoFar + 1) * drum.loopSec;
          // Ensure it's in the future
          while (nextNatural < now + 0.05) nextNatural += drum.loopSec;
          drum.nextFireTime = nextNatural;
        }
        return;
      }

      const linear = 1 - dist / CONDUCTOR_RADIUS;
      const inf     = Math.pow(linear, 2);
      drum._conductorPull = inf;

      // Pick subdivision based on proximity
      const subIdx          = Math.min(Math.floor((1 - inf) * SUBDIVISIONS.length), SUBDIVISIONS.length - 1);
      const subInterval     = SUBDIVISIONS[subIdx];
      const effectiveInterval = Math.min(subInterval, drum.loopSec);

      // Next grid point anchored to masterOriginTime at chosen subdivision
      const elapsed       = now - masterOriginTime;
      const cyclesSoFar   = Math.floor(elapsed / effectiveInterval);
      const nextGridPoint = masterOriginTime + (cyclesSoFar + 1) * effectiveInterval;

      if (nextGridPoint < drum.nextFireTime) {
        drum.nextFireTime = nextGridPoint;
      }
    });
  });
}

// --- MAIN LOOP ---------------------------------------------------------------

let frameCount = 0;
function loop() {
  requestAnimationFrame(loop);
  frameCount++;

  try {
    // Fade trail
    gfx.fillStyle = 'rgba(0,0,0,0.18)';
    gfx.fillRect(0, 0, W, H);

    updateProximity();
    updateConductor();
    drawVoidZone();

    // Update active (held) growing circles each frame
    const now = performance.now();
    Object.values(activeTouches).forEach(td => {
      if (td.growCircle && td.startTime && !td.dragging) {
        const held = (now - td.startTime) / 1000;
        td.growCircle.grow(held);
      }
    });

    growingCircles.forEach(g => { g.update(); g.draw(); });
    growingCircles = growingCircles.filter(g => g.alive);

    nodes.forEach(n => { n.update(); n.updatePositionalEffect(); n.draw(); });
  } catch(e) {
    // Show error on screen so we can see it through cross-origin restrictions
    if (!window._errShown) {
      window._errShown = true;
      const d = document.createElement('div');
      d.style.cssText = 'position:fixed;top:30px;left:0;right:0;background:#c00;color:#fff;padding:8px;z-index:9999;font:11px monospace;word-break:break-all;white-space:pre-wrap';
      d.textContent = 'LOOP ERR: ' + e.message + '\n' + (e.stack || '');
      document.body.appendChild(d);
    }
  }
}
const splash = document.getElementById('splash');
const splashBtn = document.getElementById('splash-btn');
const hint = document.getElementById('hint');
const bpmVal = document.getElementById('bpm-val');
const nodeCount = document.getElementById('node-count');
loop();

function getColor() {
  return PALETTE[Math.floor(Math.random() * PALETTE.length)];
}

function getVoiceType(index) {
  if (index === 0) return 'doublesawbass';
  // Bass spawns whenever no doublesawbass present
  const hasBass = nodes.some(n => n.voiceType === 'doublesawbass');
  if (!hasBass) return 'doublesawbass';
  // After 3 drums exist, next spawn is conductor (if none exists yet)
  const drumCount = nodes.filter(n => PERC_TYPES.includes(n.voiceType)).length;
  const hasConductor = nodes.some(n => n.voiceType === 'conductor');
  if (drumCount >= 3 && !hasConductor) return 'conductor';
  return 'drumbreak';
}

function onTouchStart(e) {
  e.preventDefault();
  if (!ctx) return;
  if (ctx.state === 'suspended') ctx.resume();
  hint.style.opacity = '0';

  Array.from(e.changedTouches).forEach(touch => {
    const x = touch.clientX, y = touch.clientY;

    // Check if touch hits an existing node -- if so, enter drag mode
    const hitNode = [...nodes].reverse().find(n => {
      const dist = Math.hypot(n.x - x, n.y - y);
      return dist < n.baseRadius + 16; // generous hit target
    });

    if (hitNode) {
      activeTouches[touch.identifier] = {
        dragging: hitNode,
        startTime: null,
        growCircle: null
      };
      voidActive = true; // show void zone when dragging
      return;
    }

    // New node mode -- same as before
    const color = getColor();
    const growCircle = new GrowingCircle(x, y, color);
    growingCircles.push(growCircle);
    activeTouches[touch.identifier] = {
      startTime: performance.now(),
      x, y, color,
      growCircle,
      dragging: null
    };
  });
}

function onTouchMove(e) {
  e.preventDefault();
  Array.from(e.changedTouches).forEach(touch => {
    const td = activeTouches[touch.identifier];
    if (!td) return;

    if (td.dragging) {
      td.dragging.x = touch.clientX;
      td.dragging.y = touch.clientY;

      // Check if over void zone (bottom strip)
      voidEngulfing = isInVoidZone(td.dragging.x, td.dragging.y);
    } else if (td.growCircle && td.startTime) {
      const held = (performance.now() - td.startTime) / 1000;
      td.growCircle.grow(held);
    }
  });
}

function onTouchEnd(e) {
  e.preventDefault();
  Array.from(e.changedTouches).forEach(touch => {
    const td = activeTouches[touch.identifier];
    if (!td) return;

    // If we were dragging, check if dropped in void zone
    if (td.dragging) {
      if (isInVoidZone(td.dragging.x, td.dragging.y)) {
        destroyNode(td.dragging);
      }
      voidActive    = false;
      voidEngulfing = false;
      delete activeTouches[touch.identifier];
      return;
    }

    try {
    const pressSec = (performance.now() - td.startTime) / 1000;
    const clampedSec = Math.max(0.1, Math.min(pressSec, 8));

    if (td.growCircle) td.growCircle.release();

    if (nodes.length === 0) {
      // -- FIRST LOOP: press duration sets BPM + loop length --
      const { bpm: detectedBPM, loopBeats } = snapFirstLoop(clampedSec);
      bpm = detectedBPM;
      masterBeatSec   = 60 / bpm;
      masterLoopBeats = loopBeats;

      // The 16th note grid unit in seconds
      // (used for phase offsets on all nodes)
      masterSixteenthSec      = masterBeatSec / 4;
      masterThirtySecondSec   = masterBeatSec / 8;

      rootHz    = ROOTS[Math.floor(Math.random() * ROOTS.length)];
      scaleType = Object.keys(SCALES)[Math.floor(Math.random() * Object.keys(SCALES).length)];
      arpBassOffset = Math.floor(Math.random() * BASS_ARP_PATTERNS.length);

      bpmVal.textContent = bpm;
      startScheduler();

      const voiceType  = getVoiceType(0);
      const isPerc     = PERC_TYPES.includes(voiceType);
      const hz         = isPerc ? 0 : getQuantizedNote('bass');
      const noteDurSec = isPerc ? masterBeatSec * 0.45 : clampedSec * 0.88;
      const node = new SynthNode(td.x, td.y, td.color, loopBeats, noteDurSec, voiceType, hz, 0, clampedSec);
      // First node fires as soon as possible -- sets the master clock
      masterOriginTime    = ctx.currentTime + 0.05;
      node.nextFireTime   = masterOriginTime;
      nodes.push(node);
      nodeCount.textContent = nodes.length;

    } else {
      // -- SUBSEQUENT LOOPS: loop length from press, phase from 16th grid --
      const rawBeats   = clampedSec / masterBeatSec;
      const multiples  = [0.125, 0.25, 0.5, 1, 2, 4, 8]
        .map(m => masterLoopBeats * m)
        .filter(b => b >= 0.25 && b <= 32);
      const loopBeats  = multiples.reduce((best, b) =>
        Math.abs(b - rawBeats) < Math.abs(best - rawBeats) ? b : best
      );
      const loopSec    = loopBeats * masterBeatSec;

      let voiceType  = getVoiceType(nodes.length);
      const isPerc   = PERC_TYPES.includes(voiceType);

      let finalLoopBeats;
      if (isPerc) {
        const drumSnaps = [8, 16, 32];
        finalLoopBeats = drumSnaps.reduce((best, b) =>
          Math.abs(b - rawBeats) < Math.abs(best - rawBeats) ? b : best
        );
      } else {
        // Bass respawn uses same loop length as the first node had
        finalLoopBeats = loopBeats;
      }
      const finalLoopSec = finalLoopBeats * masterBeatSec;

      const hz         = isPerc ? 0 : getQuantizedNote('bass');
      const noteDurSec = isPerc ? finalLoopSec : finalLoopSec * 0.88;

      // Drum density: short press = sparse (1-2 hits), long press = full pattern
      // Map clampedSec (0.1 to 8s) to density (0.15 to 1.0)
      const hitDensity = isPerc ? Math.max(0.15, Math.min(1.0, clampedSec / 4.0)) : 1.0;

      const node = new SynthNode(td.x, td.y, td.color, finalLoopBeats, noteDurSec, voiceType, hz, 0, clampedSec);
      if (isPerc) node.hitDensity = hitDensity;
      const now  = ctx.currentTime;

      if (isPerc) {
        // Drums: fire on next beat boundary
        const elapsed      = now - masterOriginTime;
        const beatsSoFar   = Math.floor(elapsed / masterBeatSec);
        const nextBeatTime = masterOriginTime + (beatsSoFar + 1) * masterBeatSec;
        node.nextFireTime  = (nextBeatTime - now < 0.08)
          ? masterOriginTime + (beatsSoFar + 2) * masterBeatSec
          : nextBeatTime;
        // Store this as the drum's personal phase anchor so snap-back restores it correctly
        node.phaseOffsetSec = node.nextFireTime - masterOriginTime;
      } else {
        // Bass respawn: align to nearest loop boundary
        const elapsed      = now - masterOriginTime;
        const cyclesSoFar  = Math.floor(elapsed / finalLoopSec);
        const prevBoundary = masterOriginTime + cyclesSoFar * finalLoopSec;
        const nextBoundary = prevBoundary + finalLoopSec;
        node.nextFireTime  = (now - prevBoundary) < (nextBoundary - now)
          ? prevBoundary : nextBoundary;
        while (node.nextFireTime < now + 0.04) node.nextFireTime += finalLoopSec;
      }

      nodes.push(node);

      nodeCount.textContent = nodes.length;
    }

    } catch(err) { console.log('SPAWN ERR:', err && err.message, err && err.stack ? err.stack.split('\n').slice(0,5).join(' | ') : ''); }
    delete activeTouches[touch.identifier];
  });
}

splashBtn.addEventListener('touchend', unlockAudio, { passive: false });

function unlockAudio(e) {
  e.preventDefault();
  // Create and immediately resume AudioContext inside this gesture
  ctx = new (window.AudioContext || window.webkitAudioContext)();
  ctx.resume().then(() => {
    // Play a silent buffer to fully unlock iOS audio
    const buf = ctx.createBuffer(1, 1, ctx.sampleRate);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);

    // Build master chain now that context is live
    buildMasterChain();

    splash.classList.add('hidden');
    setTimeout(() => { splash.style.display = 'none'; }, 700);
  });
}

// --- VOID ZONE ---------------------------------------------------------------
// A circular destruction area at the bottom center. Appears when dragging a node.
// Drag a node into it -> node dissolves and is removed.

// ---- VOID ZONE ----

function getVoidCenter() {
  // Returns a representative point for drag distance checking -- centre of the strip
  const safeBottom = 34;
  return { x: W / 2, y: H - safeBottom };
}

function isInVoidZone(x, y) {
  const safeBottom = 34;
  return y > H - safeBottom - 28; // within the strip zone
}

function drawVoidZone() {
  if (nodes.length === 0) return;
  if (!voidActive && !voidEngulfing) return;

  voidPulse += 0.05;
  const safeBottom = 34;
  const lineY = H - safeBottom;
  const alpha  = voidActive ? 1 : 0;

  if (alpha <= 0) return;

  // Pulsing glow strip along the bottom
  const glowH  = voidEngulfing ? 48 + Math.sin(voidPulse) * 8 : 28;
  const grad = gfx.createLinearGradient(0, lineY - glowH, 0, lineY + 8);
  grad.addColorStop(0,   `rgba(255,40,40,0)`);
  grad.addColorStop(0.6, `rgba(255,40,40,${alpha * (voidEngulfing ? 0.22 : 0.10)})`);
  grad.addColorStop(1,   `rgba(255,60,60,${alpha * (voidEngulfing ? 0.35 : 0.15)})`);
  gfx.fillStyle = grad;
  gfx.fillRect(0, lineY - glowH, W, glowH + 8);

  // The line itself
  const lineAlpha = voidEngulfing ? 0.95 : 0.55;
  const lineW     = voidEngulfing ? 2.5  : 1.5;
  gfx.beginPath();
  gfx.moveTo(0, lineY);
  gfx.lineTo(W, lineY);
  gfx.strokeStyle = `rgba(255,${voidEngulfing ? 80 : 55},${voidEngulfing ? 80 : 55},${lineAlpha})`;
  gfx.lineWidth   = lineW;
  gfx.stroke();

  // Tick marks + DESTROY label in the centre
  const label  = voidEngulfing ? 'RELEASE TO DESTROY' : 'DRAG HERE TO DESTROY';
  const labelX = W / 2;

  // Small ticks along the line
  const tickCount = 12;
  for (let i = 0; i <= tickCount; i++) {
    const tx    = (i / tickCount) * W;
    const tickH = i === tickCount / 2 ? 10 : 5;
    gfx.beginPath();
    gfx.moveTo(tx, lineY);
    gfx.lineTo(tx, lineY - tickH);
    gfx.strokeStyle = `rgba(255,60,60,${lineAlpha * 0.5})`;
    gfx.lineWidth   = 1;
    gfx.stroke();
  }

  // Label
  gfx.font      = `${voidEngulfing ? 9 : 8}px "Share Tech Mono", monospace`;
  gfx.fillStyle = `rgba(255,80,80,${lineAlpha * 0.8})`;
  gfx.textAlign = 'center';
  gfx.fillText(label, labelX, lineY - 14);
}

function destroyNode(node) {
  const isBass  = node.voiceType === 'doublesawbass';
  const isDrone = node.voiceType === 'drone';
  const fadeTime = isBass ? 4.0 : isDrone ? 3.0 : 0;

  if (isBass && node.synthBus) {
    // Bass: fade synthBus
    try { node.synthBus.gain.setTargetAtTime(0, ctx.currentTime, fadeTime * 0.35); } catch(e) {}
    setTimeout(() => {
      try { if (node.synthBus)   node.synthBus.disconnect(); } catch(e) {}
      try { if (node.fxIn)      node.fxIn.disconnect(); } catch(e) {}
      try { if (node.fxOut)     node.fxOut.disconnect(); } catch(e) {}
      try { if (node.filterNode) node.filterNode.disconnect(); } catch(e) {}
      try { if (node.gainNode)   node.gainNode.disconnect(); } catch(e) {}
      try { if (node._bassOscs) node._bassOscs.forEach(o => o.stop()); } catch(e) {}
    }, fadeTime * 1000 + 100);

  } else if (isDrone) {
    // Clear pitch glide timer
    if (node._glideTimer) clearTimeout(node._glideTimer);
    // Drone: fade fxIn (kills oscillator feed into tape delay)
    // Also kill feedback loop gain so the self-oscillating delay dies too
    try { node.fxIn.gain.setTargetAtTime(0, ctx.currentTime, fadeTime * 0.35); } catch(e) {}
    try { node.fxOut.gain.setTargetAtTime(0, ctx.currentTime, fadeTime * 0.35); } catch(e) {}
    if (node.fxNodes) {
      try { node.fxNodes.fb.gain.setTargetAtTime(0, ctx.currentTime, fadeTime * 0.35); } catch(e) {}
      try { node.fxNodes.wet.gain.setTargetAtTime(0, ctx.currentTime, fadeTime * 0.35); } catch(e) {}
      try { node.fxNodes.dry.gain.setTargetAtTime(0, ctx.currentTime, fadeTime * 0.35); } catch(e) {}
    }
    setTimeout(() => {
      try { if (node.fxIn)  node.fxIn.disconnect();  } catch(e) {}
      try { if (node.fxOut) node.fxOut.disconnect();  } catch(e) {}
      try { if (node.fxNodes && node.fxNodes.wowLFO)  node.fxNodes.wowLFO.stop();  } catch(e) {}
      try { if (node.fxNodes && node.fxNodes.flutLFO) node.fxNodes.flutLFO.stop(); } catch(e) {}
      try { if (node._bassOscs) node._bassOscs.forEach(o => o.stop()); } catch(e) {}
    }, fadeTime * 1000 + 100);

  } else {
    // Instant disconnect for drums, conductor etc
    try { if (node.synthBus)   node.synthBus.disconnect(); } catch(e) {}
    try { if (node.fxIn)      node.fxIn.disconnect(); } catch(e) {}
    try { if (node.fxOut)     node.fxOut.disconnect(); } catch(e) {}
    try { if (node.filterNode) node.filterNode.disconnect(); } catch(e) {}
    try { if (node.gainNode)   node.gainNode.disconnect(); } catch(e) {}
    try { if (node.fxNodes && node.fxNodes.lfo)     node.fxNodes.lfo.stop();     } catch(e) {}
    try { if (node.fxNodes && node.fxNodes.wowLFO)  node.fxNodes.wowLFO.stop();  } catch(e) {}
    try { if (node.fxNodes && node.fxNodes.flutLFO) node.fxNodes.flutLFO.stop(); } catch(e) {}
    try { if (node._bassOscs) node._bassOscs.forEach(o => o.stop()); } catch(e) {}
  }
  // Burst of particles at death position
  const color = node.color;
  for (let i = 0; i < 20; i++) {
    const a   = Math.random() * Math.PI * 2;
    const spd = 1.5 + Math.random() * 4;
    node.particles.push({
      x: node.x, y: node.y,
      vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
      life: 1, decay: 0.025 + Math.random() * 0.025,
      r: 2 + Math.random() * 3
    });
  }
  // Keep particles alive briefly then remove node
  node.alive = false;

  nodes = nodes.filter(n => n !== node);

  // When bass is destroyed, spawn a guitar-feedback drone in a random open spot
  const wasBass = node.voiceType === 'doublesawbass';
  if (wasBass && nodes.length > 0 && masterOriginTime) {
    // Inherit the bass's last played note so the drone feels like a continuation
    const lastHz = (node.arpNotes && node.arpNotes.length > 0)
      ? node.arpNotes[0]  // root note of current phrase
      : rootHz;

    // Spawn at the bass's exact position -- visual continuity
    const loopBeats = masterLoopBeats || 8;
    const loopSec   = loopBeats * masterBeatSec;

    // Inherit the bass's color exactly
    const droneColor = [...node.color];

    const droneNode = new SynthNode(
      node.x, node.y,
      droneColor, loopBeats, loopSec, 'drone', lastHz, 0, 1.5
    );
    // Fire immediately so drone voice starts building as bass fades
    droneNode.nextFireTime = ctx.currentTime + 0.05;
    nodes.push(droneNode);
    nodeCount.textContent = nodes.length;
  }

  // If all nodes gone, reset the session state
  if (nodes.length === 0) {
    bpm = null;
    arpSlotCounter = 0;
    arpBassOffset  = 0;
    masterLoopBeats = null;
    masterBeatSec   = null;
    masterSixteenthSec    = null;
    masterThirtySecondSec = null;
    masterOriginTime      = null;
    if (beatTimerRef) clearInterval(beatTimerRef);
    bpmVal.textContent  = '--';
    nodeCount.textContent = '0';
    hint.style.opacity  = '1';
  } else {
    nodeCount.textContent = nodes.length;
  }
}
</script>
</body>
</html>
