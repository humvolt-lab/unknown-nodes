<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>UNKNOWN NODES</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;

  :root {
    --bg: #000000;
    --ui-dim: rgba(255,255,255,0.08);
    --ui-text: rgba(255,255,255,0.25);

    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;

  /* -- iOS Audio Unlock Splash -- */

    position: fixed;

    text-transform: uppercase;
  }
  #splash-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
  }
  #splash-btn {
    margin-top: 16px;
    padding: 18px 48px;
    background: none;
    border: 1px solid rgba(255,255,255,0.3);

    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;

    border-radius: 2px;

    -webkit-tap-highlight-color: transparent;
  }
  #splash-btn:active {
    border-color: rgba(0, 220, 255, 0.8);

  #ui {

  .ui-label {
    font-family: 'Share Tech Mono', monospace;

  #hint {

    color: rgba(255,255,255,0.12);
    text-transform: uppercase;

  #void-zone {
    position: fixed;
    bottom: env(safe-area-inset-bottom, 20px);
    left: 50%;
    transform: translateX(-50%);

    z-index: 10;

  #void-zone.visible {
    opacity: 1;

<body>

<!-- iOS Audio Unlock Splash -->
<div id="splash">
  <div id="splash-title">UNKNOWN NODES</div>
  <div id="splash-sub">touch instrument</div>
  <button id="splash-btn">INITIALIZE AUDIO</button>
  <div id="splash-instructions">
    hold &amp; release to set tempo<br>
    each touch adds a new voice<br>
    first touch sets bpm
  </div>
</div>

<canvas id="c"></canvas>

<div id="ui">
  <div class="ui-label" id="bpm-display">BPM <span id="bpm-val">--</span></div>
  <div class="ui-label">.</div>
  <div class="ui-label">NODES <span id="node-count">0</span></div>
</div>

<div id="hint">touch to begin</div>

<script>
window.onerror = function(msg, src, line, col, err) {
  document.title = 'ERR L' + line + ': ' + msg;
  var d = document.createElement('div');
  d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:red;color:white;padding:10px;z-index:9999;font-size:12px;word-break:break-all';
  d.textContent = 'L' + line + ':' + col + ' ' + msg + (err ? ' | ' + err.stack : '');
  document.body ? document.body.appendChild(d) : setTimeout(function(){ document.body.appendChild(d); }, 100);
  return false;
};
// --- AUDIO ENGINE ------------------------------------------------------------

let ctx = null;
let masterGain, masterLimiter, masterReverb;
let bpm = null;
let masterLoopBeats = null;
let masterBeatSec   = null;
let masterSixteenthSec = null;
let masterThirtySecondSec = null;
let nodes = [];
let activeTouches = {};

// Void zone state
const VOID_RADIUS   = 44;
let voidPulse       = 0;
let voidActive      = false;
let voidEngulfing   = false;

const PERC_TYPES = ['drumbreak','808kick','808snare','hihat','openhat','rimshot','conductor','drone'];

function initAudio() {
  if (ctx) return;
  // ctx is now created in unlockAudio; this is a no-op safety guard
}


let drumBus  = null; // all drum breaks route here
let synthBus = null; // all synth/bass voices route here

function buildMasterChain() {
  // Each node has its own positional effect (reverb/delay/overdrive/tape/filter).
  // Bus level is clean -- no additional drive here, just level control + master.

  // Balanced buses -- drums and bass at equal footing
  drumBus  = ctx.createGain(); drumBus.gain.value  = 0.75;
  synthBus = ctx.createGain(); synthBus.gain.value = 0.60;

  // Master bus
  masterGain = ctx.createGain(); masterGain.gain.value = 0.78;

  masterReverb = ctx.createConvolver();
  masterReverb.buffer = makeReverbIR(ctx, 0.7, 0.6); // shorter, less dense reverb

  // Separate reverb sends -- synth gets more reverb than drums
  const synthReverbSend = ctx.createGain(); synthReverbSend.gain.value = 0.08;
  const drumReverbSend  = ctx.createGain(); drumReverbSend.gain.value  = 0.03;
  const dryGain         = ctx.createGain(); dryGain.gain.value         = 0.95;

  // True peak limiter
  masterLimiter = ctx.createDynamicsCompressor();
  masterLimiter.threshold.value = -2;
  masterLimiter.knee.value      = 2;
  masterLimiter.ratio.value     = 20;
  masterLimiter.attack.value    = 0.005;
  masterLimiter.release.value   = 0.35;

  // Routing: drums and synth have separate reverb sends
  drumBus.connect(masterGain);
  synthBus.connect(masterGain);

  masterGain.connect(dryGain);
  synthBus.connect(synthReverbSend); synthReverbSend.connect(masterReverb);
  drumBus.connect(drumReverbSend);   drumReverbSend.connect(masterReverb);
  masterReverb.connect(masterGain);  // reverb feeds back into master dry path
  dryGain.connect(masterLimiter);
  masterLimiter.connect(ctx.destination);
}

function makeDistortionCurve(amount) {
  const n = 256, curve = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const x = (i * 2) / n - 1;
    curve[i] = ((Math.PI + amount) * x) / (Math.PI + amount * Math.abs(x));
  }
  return curve;
}

// Bit crusher curve: quantises to N bits by stepping the output
function makeCrusherCurve(bits) {
  const n      = 256;
  const curve  = new Float32Array(n);
  const steps  = Math.pow(2, bits);
  for (let i = 0; i < n; i++) {
    const x    = (i * 2) / n - 1;
    // Quantise to `steps` levels then normalise back to -1..1
    curve[i]   = Math.round(x * steps) / steps;
  }
  return curve;
}

function makeReverbIR(actx, duration, decay) {
  const sr = actx.sampleRate;
  const len = sr * duration;
  const buf = actx.createBuffer(2, len, sr);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
    }
  }
  return buf;
}

// --- SYNTH VOICE DEFINITIONS -------------------------------------------------

const SCALES = {
  minor:      [0, 2, 3, 5, 7, 8, 10],
  dorian:     [0, 2, 3, 5, 7, 9, 10],
  phrygian:   [0, 1, 3, 5, 7, 8, 10],
};

// Bass-friendly roots: E1, A1, D2, G2
const ROOTS = [41.2, 55.0, 73.4, 49.0];
let rootHz = ROOTS[0];
let scaleType = 'minor';

function midiToHz(midi) {
  return 440 * Math.pow(2, (midi - 69) / 12);
}

function getQuantizedNote(register = 'bass') {
  const scale = SCALES[scaleType];
  // Bass register: octaves 1-2; mid: 2-3
  const octave = register === 'bass'
    ? Math.floor(Math.random() * 2)
    : 1 + Math.floor(Math.random() * 2);
  const degree = scale[Math.floor(Math.random() * scale.length)];
  const rootMidi = 28 + Math.round(12 * Math.log2(rootHz / 41.2));
  return midiToHz(rootMidi + octave * 12 + degree);
}

// Weighted voice pool -- 50% drum breaks, 50% synth
const SYNTH_POOL = ['doublesawbass','doublesawbass','acidbass','sawlead'];
const DRUM_POOL  = ['drumbreak'];
const POSITIONAL_EFFECT_TYPES = ['overdrive', 'tape', 'delay', 'distortion', 'bitcrusher'];

// -- DRONE SYNTH --------------------------------------------------------------
// Intentional extension of the bass arp -- steps through arp notes on the beat
// with a punchy filter envelope per note, just much longer held notes than the arp.
function buildDroneVoice(hz, node) {
  const dest = (node && node.fxIn) ? node.fxIn : (node && node.synthBus) ? node.synthBus : synthBus;
  const now  = ctx.currentTime;
  const beat = masterBeatSec || 0.5;

  // Same oscillator character as bass -- detuned saws + sub
  const detune  = 8 + Math.random() * 12;
  const filterLo  = 60  + Math.random() * 60;
  const filterPeak= 800 + Math.random() * 1400;
  const filterQ   = 5   + Math.random() * 8;

  const s1  = ctx.createOscillator(); s1.type = 'sawtooth'; s1.frequency.value = hz;
  const s2  = ctx.createOscillator(); s2.type = 'sawtooth'; s2.frequency.value = hz;
  const sub = ctx.createOscillator(); sub.type = 'sine';     sub.frequency.value = hz / 2;
  s1.detune.value =  detune;
  s2.detune.value = -detune;

  // Square wave for grit -- same as bass
  const sq = ctx.createOscillator(); sq.type = 'square'; sq.frequency.value = hz;
  sq.detune.value = detune * 0.3;
  const sqGain = ctx.createGain(); sqGain.gain.value = 0.12;

  const sawMix  = ctx.createGain(); sawMix.gain.value  = 0.50;
  const subGain = ctx.createGain(); subGain.gain.value = 0.55;

  // Pre-filter drive -- same warmth as bass
  const drive = ctx.createWaveShaper();
  const dc = new Float32Array(256);
  for (let i = 0; i < 256; i++) {
    const x = (i / 128) - 1;
    dc[i] = Math.tanh(x * 2.5) * 0.75;
  }
  drive.curve = dc; drive.oversample = '2x';

  // Resonant filter
  const filt = ctx.createBiquadFilter(); filt.type = 'lowpass';
  filt.frequency.value = filterLo;
  filt.Q.value = filterQ;

  // Amp -- swell in cleanly matching bass fade duration
  const ampEnv = ctx.createGain(); ampEnv.gain.value = 0;
  ampEnv.gain.setTargetAtTime(0.5, now, 1.2); // 1.2s time constant -- present by ~3s

  // Wide stereo delay
  const wideDelay = ctx.createDelay(0.02); wideDelay.delayTime.value = 0.007;
  const wideGain  = ctx.createGain(); wideGain.gain.value = 0.25;

  // Signal path
  s1.connect(sawMix); s2.connect(sawMix);
  sq.connect(sqGain); sqGain.connect(sawMix);
  sawMix.connect(drive);
  sub.connect(subGain); subGain.connect(filt);
  drive.connect(filt);
  filt.connect(ampEnv);
  ampEnv.connect(dest);
  ampEnv.connect(wideDelay); wideDelay.connect(wideGain); wideGain.connect(dest);

  s1.start(now); s2.start(now); sq.start(now); sub.start(now);
  if (node) node._bassOscs = [s1, s2, sq, sub];

  // Step through arp notes on a slow beat -- every 2 or 4 bars
  // Each note gets a punchy filter sweep like the bass, just longer held
  let noteIdx = 0;
  const noteDurBeats = 4; // hold each note for 4 beats
  const sweepTime    = 0.04 + Math.random() * 0.08;
  const decayTime    = 0.6  + Math.random() * 0.8;

  function playNextNote() {
    if (!node || !node.alive) return;
    const nx = W > 0 ? Math.max(0, Math.min(1, node.x / W)) : 0.5;
    const ny = H > 0 ? Math.max(0, Math.min(1, node.y / H)) : 0.5;
    const notes    = buildPositionalArp(nx, ny);
    const targetHz = notes[noteIdx % notes.length];
    noteIdx++;

    const t = ctx.currentTime;

    // Glide to new note
    s1.frequency.setTargetAtTime(targetHz,      t, 0.08);
    s2.frequency.setTargetAtTime(targetHz,      t, 0.08);
    sq.frequency.setTargetAtTime(targetHz,      t, 0.08);
    sub.frequency.setTargetAtTime(targetHz / 2, t, 0.08);

    // Filter sweep per note -- same shape as bass but longer decay
    filt.frequency.cancelScheduledValues(t);
    filt.frequency.setValueAtTime(filterLo, t);
    filt.frequency.linearRampToValueAtTime(filterPeak, t + sweepTime);
    filt.frequency.exponentialRampToValueAtTime(filterLo * 1.5, t + sweepTime + decayTime);

    // Schedule next note after noteDurBeats
    const interval = beat * noteDurBeats;
    node._glideTimer = setTimeout(playNextNote, interval * 1000);
  }

  // First note fires immediately, then steps every noteDurBeats
  if (node) {
    node._glideTimer = setTimeout(playNextNote, 100); // near-immediate first step
  }

  return function play(time, noteDur, newHz) {};
}

function buildVoice(type, hz, node) {
  if (type === 'drumbreak')      return buildDrumBreak(node);
  if (type === '808kick')        return buildDrumBreak(node);
  if (type === '808snare')       return buildDrumBreak(node);
  if (type === '808hat')         return buildDrumBreak(node);
  if (type === 'openhat')        return buildDrumBreak(node);
  if (type === 'rimshot')        return buildDrumBreak(node);
  if (type === 'doublesawbass')  return buildDoubleSawBass(hz, node);
  if (type === 'acidbass')       return buildAcidBass(hz, node);
  if (type === 'sawlead')        return buildSawLead(hz, node);
  if (type === 'drone')          return buildDroneVoice(hz, node);
  if (type === 'conductor')      return function play() {}; // no audio -- pure control
  return buildDoubleSawBass(hz, node);
}

// -- DRUM BREAK SYSTEM --------------------------------------------------------
// Each percussion node is a FULL DRUM BREAK: kick + snare + hats + tom firing
// together in a randomised pattern, occupying the FIRST HALF of the loop.
// The second half is silence -- breathing room for other breaks to interlock.
// Each break style has a completely different effect chain.

// -- LOW-LEVEL HIT GENERATORS -------------------------------------------------

function fireKick(t, pitch, dec, vel, out) {
  // 808-style: sine body with long exponential pitch drop + sub harmonic layer + punchy click
  const sr = ctx.sampleRate;

  // Main sine body -- pitches from ~160Hz down to deep sub
  const body = ctx.createOscillator(); body.type = 'sine';
  body.frequency.setValueAtTime(pitch, t);
  body.frequency.setTargetAtTime(pitch * 0.08, t, 0.035); // slow exponential drop to sub
  const bodyEnv = ctx.createGain();
  bodyEnv.gain.setValueAtTime(0, t);
  bodyEnv.gain.linearRampToValueAtTime(vel * 0.75, t + 0.003); // pulled back from 1.1
  bodyEnv.gain.exponentialRampToValueAtTime(0.001, t + dec);

  // Sub octave layer -- shorter decay so consecutive kicks don't stack
  const sub = ctx.createOscillator(); sub.type = 'sine';
  sub.frequency.setValueAtTime(pitch * 0.5, t);
  sub.frequency.setTargetAtTime(pitch * 0.04, t, 0.04);
  const subEnv = ctx.createGain();
  subEnv.gain.setValueAtTime(vel * 0.35, t); // pulled back from 0.6
  subEnv.gain.exponentialRampToValueAtTime(0.001, t + dec * 0.7); // shorter tail

  // Transient click
  const cLen = Math.floor(sr * 0.012);
  const cBuf = ctx.createBuffer(1, cLen, sr);
  const cd = cBuf.getChannelData(0);
  for (let i = 0; i < cLen; i++) cd[i] = (Math.random()*2-1) * Math.pow(1 - i/cLen, 2);
  const clk = ctx.createBufferSource(); clk.buffer = cBuf;
  const clkEnv = ctx.createGain();
  clkEnv.gain.setValueAtTime(vel * 0.5, t); // pulled back from 0.8
  clkEnv.gain.exponentialRampToValueAtTime(0.001, t + 0.012);

  // Mild soft clip
  const clip = ctx.createWaveShaper();
  const cc = new Float32Array(256);
  for (let i = 0; i < 256; i++) { const x = (i/128)-1; cc[i] = Math.tanh(x * 2.0) * 0.75; } // softer clip
  clip.curve = cc;

  const kickBus = ctx.createGain(); kickBus.gain.value = 0.75; // pulled back from 1.0
  body.connect(bodyEnv); bodyEnv.connect(kickBus);
  sub.connect(subEnv);   subEnv.connect(kickBus);
  clk.connect(clkEnv);   clkEnv.connect(kickBus);
  kickBus.connect(clip); clip.connect(out);

  body.start(t); body.stop(t + dec + 0.15);
  sub.start(t);  sub.stop(t + dec + 0.2);
  clk.start(t);  clk.stop(t + 0.015);
}

function fireSnare(t, tone, dec, vel, out) {
  const sr = ctx.sampleRate;

  // Noise layer -- the "snare wire" rattle
  const nLen = Math.floor(sr * 0.28);
  const nBuf = ctx.createBuffer(1, nLen, sr);
  const nd = nBuf.getChannelData(0);
  for (let i = 0; i < nLen; i++) nd[i] = (Math.random()*2-1) * Math.pow(1 - i/nLen, 1.2);
  const noise = ctx.createBufferSource(); noise.buffer = nBuf;
  const nFilt = ctx.createBiquadFilter(); nFilt.type = 'bandpass';
  nFilt.frequency.value = 2800; nFilt.Q.value = 0.7;
  const nEnv = ctx.createGain();
  nEnv.gain.setValueAtTime(vel * 0.85, t);
  nEnv.gain.exponentialRampToValueAtTime(0.001, t + dec);

  // Tone body -- two oscillators for the drum head resonance
  const o1 = ctx.createOscillator(); o1.type = 'triangle'; o1.frequency.value = tone;
  const o2 = ctx.createOscillator(); o2.type = 'sine';     o2.frequency.value = tone * 1.52;
  // Slight pitch drop like a real snare head
  o1.frequency.setTargetAtTime(tone * 0.8, t, 0.03);
  const tEnv = ctx.createGain();
  tEnv.gain.setValueAtTime(vel * 0.55, t);
  tEnv.gain.exponentialRampToValueAtTime(0.001, t + dec * 0.4);

  noise.connect(nFilt); nFilt.connect(nEnv); nEnv.connect(out);
  o1.connect(tEnv); o2.connect(tEnv); tEnv.connect(out);
  noise.start(t); o1.start(t); o2.start(t);
  noise.stop(t + dec + 0.05); o1.stop(t + dec); o2.stop(t + dec);
}

function fireHat(t, open, vel, out) {
  // TR-808 metallic hat: six square oscillators at specific intervals
  const dur = open ? 0.22 + Math.random()*0.12 : 0.022 + Math.random()*0.012;
  const mix = ctx.createGain(); mix.gain.value = 0.001;
  // 808 hat frequencies -- these specific ratios create the metallic ring
  [205.3, 369.6, 440, 784, 987.8, 1174.7].forEach(f => {
    const o = ctx.createOscillator(); o.type = 'square'; o.frequency.value = f;
    o.connect(mix); o.start(t); o.stop(t + dur + 0.02);
  });
  const hpf = ctx.createBiquadFilter(); hpf.type = 'highpass'; hpf.frequency.value = 7000;
  // Open hat gets a bandpass resonance for that sizzle
  const bpf = ctx.createBiquadFilter(); bpf.type = 'bandpass';
  bpf.frequency.value = open ? 9000 : 10000; bpf.Q.value = 0.6;
  const env = ctx.createGain();
  env.gain.setValueAtTime(vel * 1.2, t);
  env.gain.exponentialRampToValueAtTime(0.001, t + dur);
  mix.connect(hpf); hpf.connect(bpf); bpf.connect(env); env.connect(out);
}

function fireTom(t, pitch, dec, vel, out) {
  // Punchy tom: sine with pitch drop + noise transient
  const body = ctx.createOscillator(); body.type = 'sine';
  body.frequency.setValueAtTime(pitch * 1.4, t); // starts higher, drops to pitch
  body.frequency.exponentialRampToValueAtTime(pitch * 0.7, t + dec * 0.5);
  const bodyEnv = ctx.createGain();
  bodyEnv.gain.setValueAtTime(vel, t);
  bodyEnv.gain.exponentialRampToValueAtTime(0.001, t + dec);

  // Head snap transient
  const nLen = Math.floor(ctx.sampleRate * 0.025);
  const nBuf = ctx.createBuffer(1, nLen, ctx.sampleRate);
  const nd = nBuf.getChannelData(0);
  for (let i = 0; i < nLen; i++) nd[i] = (Math.random()*2-1) * Math.pow(1 - i/nLen, 2);
  const ns = ctx.createBufferSource(); ns.buffer = nBuf;
  const nFilt = ctx.createBiquadFilter(); nFilt.type = 'bandpass';
  nFilt.frequency.value = pitch * 3; nFilt.Q.value = 1.2;
  const nEnv = ctx.createGain(); nEnv.gain.setValueAtTime(vel * 0.5, t);
  nEnv.gain.exponentialRampToValueAtTime(0.001, t + 0.025);

  body.connect(bodyEnv); bodyEnv.connect(out);
  ns.connect(nFilt); nFilt.connect(nEnv); nEnv.connect(out);
  body.start(t); body.stop(t + dec + 0.05);
  ns.start(t); ns.stop(t + 0.03);
}

function fireRim(t, vel, out) {
  // Tight rimshot: two detuned triangles + filtered noise snap
  const o1 = ctx.createOscillator(); o1.type = 'triangle'; o1.frequency.value = 450;
  const o2 = ctx.createOscillator(); o2.type = 'triangle'; o2.frequency.value = 1350;
  const env = ctx.createGain();
  env.gain.setValueAtTime(vel, t);
  env.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
  const hpf = ctx.createBiquadFilter(); hpf.type = 'highpass'; hpf.frequency.value = 1000;
  o1.connect(env); o2.connect(env); env.connect(hpf); hpf.connect(out);
  o1.start(t); o2.start(t); o1.stop(t+0.06); o2.stop(t+0.06);
}

// -- Clap -- layered noise bursts with slight timing offsets (human feel)
function fireClap(t, vel, out) {
  for (let i = 0; i < 3; i++) {
    const offset = i * 0.008;
    const nLen = Math.floor(ctx.sampleRate * 0.06);
    const nBuf = ctx.createBuffer(1, nLen, ctx.sampleRate);
    const nd = nBuf.getChannelData(0);
    for (let j = 0; j < nLen; j++) nd[j] = (Math.random()*2-1) * Math.pow(1 - j/nLen, 2.5);
    const src = ctx.createBufferSource(); src.buffer = nBuf;
    const bpf = ctx.createBiquadFilter(); bpf.type = 'bandpass';
    bpf.frequency.value = 1000 + Math.random()*400; bpf.Q.value = 0.9;
    const env = ctx.createGain();
    env.gain.setValueAtTime(vel * (0.6 + i * 0.2), t + offset);
    env.gain.exponentialRampToValueAtTime(0.001, t + offset + 0.06);
    src.connect(bpf); bpf.connect(env); env.connect(out);
    src.start(t + offset); src.stop(t + offset + 0.07);
  }
}

// -- Tight kick -- punchy, shorter decay, more click
function fireTightKick(t, pitch, vel, out) {
  const osc = ctx.createOscillator(); osc.type = 'sine';
  osc.frequency.setValueAtTime(pitch, t);
  osc.frequency.exponentialRampToValueAtTime(pitch * 0.2, t + 0.03);
  const env = ctx.createGain();
  env.gain.setValueAtTime(vel, t);
  env.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
  const cLen = Math.floor(ctx.sampleRate * 0.015);
  const cBuf = ctx.createBuffer(1, cLen, ctx.sampleRate);
  const cd = cBuf.getChannelData(0);
  for (let i = 0; i < cLen; i++) cd[i] = (Math.random()*2-1) * Math.pow(1-i/cLen, 1.5);
  const clk = ctx.createBufferSource(); clk.buffer = cBuf;
  const clkEnv = ctx.createGain(); clkEnv.gain.setValueAtTime(vel*0.9, t);
  clkEnv.gain.exponentialRampToValueAtTime(0.001, t+0.015);
  osc.connect(env); env.connect(out);
  clk.connect(clkEnv); clkEnv.connect(out);
  osc.start(t); osc.stop(t+0.15); clk.start(t); clk.stop(t+0.02);
}

// -- Snare with longer room tail
function fireRoomSnare(t, tone, dec, vel, out) {
  const nLen = Math.floor(ctx.sampleRate * 0.4);
  const nBuf = ctx.createBuffer(1, nLen, ctx.sampleRate);
  const nd = nBuf.getChannelData(0);
  for (let i = 0; i < nLen; i++) nd[i] = (Math.random()*2-1) * Math.pow(1 - i/nLen, 0.8);
  const noise = ctx.createBufferSource(); noise.buffer = nBuf;
  const nf = ctx.createBiquadFilter(); nf.type = 'bandpass'; nf.frequency.value = 2200; nf.Q.value = 0.6;
  const nEnv = ctx.createGain();
  nEnv.gain.setValueAtTime(vel * 0.7, t);
  nEnv.gain.exponentialRampToValueAtTime(0.001, t + dec * 1.4);
  const body = ctx.createOscillator(); body.type = 'triangle'; body.frequency.value = tone * 0.85;
  const bEnv = ctx.createGain();
  bEnv.gain.setValueAtTime(vel * 0.5, t);
  bEnv.gain.exponentialRampToValueAtTime(0.001, t + dec * 0.5);
  noise.connect(nf); nf.connect(nEnv); nEnv.connect(out);
  body.connect(bEnv); bEnv.connect(out);
  noise.start(t); body.start(t);
  noise.stop(t + dec * 1.5); body.stop(t + dec * 0.6);
}

// -- Cowbell -- classic 808 cowbell
function fireCowbell(t, vel, out) {
  const f1 = ctx.createOscillator(); f1.type = 'square'; f1.frequency.value = 562;
  const f2 = ctx.createOscillator(); f2.type = 'square'; f2.frequency.value = 845;
  const bpf = ctx.createBiquadFilter(); bpf.type = 'bandpass'; bpf.frequency.value = 700; bpf.Q.value = 2;
  const env = ctx.createGain();
  env.gain.setValueAtTime(vel * 0.6, t);
  env.gain.exponentialRampToValueAtTime(0.001, t + 0.3 + Math.random() * 0.2);
  f1.connect(bpf); f2.connect(bpf); bpf.connect(env); env.connect(out);
  f1.start(t); f2.start(t); f1.stop(t+0.55); f2.stop(t+0.55);
}

function generateBreakPattern(density) {
  density = density || 1.0;
  const phrase = BREAK_PHRASES[Math.floor(Math.random() * BREAK_PHRASES.length)];
  const humanised = phrase.map(hit => ({
    ...hit,
    vel: Math.min(1, hit.vel * (0.88 + Math.random() * 0.18))
  }));
  if (density >= 1.0) return humanised;

  // Sort hits by velocity descending -- keep the most important hits first
  const sorted = [...humanised].sort((a, b) => b.vel - a.vel);
  // Keep at least 1 hit, scale up to full pattern
  const keepCount = Math.max(1, Math.round(sorted.length * density));
  const kept = new Set(sorted.slice(0, keepCount).map((_, i) => i));
  // Rebuild preserving original order, only including kept hits
  const keptHits = sorted.slice(0, keepCount);
  return humanised.filter(hit => keptHits.some(k => k.step === hit.step && k.inst === hit.inst));
}

// -- BREAK STYLE 1: BOOM BAP ---------------------------------------------------
// Deep sub kicks, cracking snare, vinyl warmth.
// Effect: gentle lowpass (worn record feel) + subtle vinyl crackle.
function buildDrumBreak_BoomBap(terminal, loopBeats, density) {
  const pat       = generateBreakPattern(density);
  const kickPitch = 140 + Math.random() * 40;  // start high, drops to deep sub
  const kickDec   = 0.7 + Math.random() * 0.4; // long 808 tail
  const snareTone = 180 + Math.random() * 45;
  const snareDec  = 0.18 + Math.random() * 0.06;

  // Vinyl warmth: gentle shelf + crackle
  const shelf = ctx.createBiquadFilter();
  shelf.type = 'lowshelf'; shelf.frequency.value = 200; shelf.gain.value = 4;
  const lpf = ctx.createBiquadFilter();
  lpf.type = 'lowpass'; lpf.frequency.value = 10000 + Math.random() * 3000;
  const outGain = ctx.createGain(); outGain.gain.value = 1.1;
  outGain.connect(shelf); shelf.connect(lpf); lpf.connect(terminal);

  return function play(time, loopSec, density, drumNode) {
    // Fresh gain for this fire -- will be faded out on next retrigger
    const fireOut = ctx.createGain(); fireOut.gain.value = 1;
    fireOut.connect(outGain);
    if (drumNode) drumNode._drumOutGain = fireOut;
    const stepSec  = masterBeatSec / 2;
    const breakSec = stepSec * 8;

    // Vinyl crackle across break window
    const crLen = Math.floor(ctx.sampleRate * breakSec);
    const crBuf = ctx.createBuffer(1, crLen, ctx.sampleRate);
    const crD   = crBuf.getChannelData(0);
    for (let i = 0; i < crLen; i++) {
      crD[i] = Math.random() > 0.9985 ? (Math.random() * 2 - 1) * 0.5 : 0;
    }
    const crSrc = ctx.createBufferSource(); crSrc.buffer = crBuf;
    const crG   = ctx.createGain(); crG.gain.value = 0.055;
    crSrc.connect(crG); crG.connect(drumBus);
    crSrc.start(time); crSrc.stop(time + breakSec + 0.01);

    pat.filter(hit => hit.step * stepSec < breakSec).forEach(hit => {
      const t = time + hit.step * stepSec;
      if (hit.inst === 'kick')  fireKick(t,  kickPitch, kickDec,  hit.vel, fireOut);
      if (hit.inst === 'snare') fireSnare(t, snareTone, snareDec * (hit.vel > 0.5 ? 1 : 0.5), hit.vel, fireOut);
      if (hit.inst === 'hat')   fireHat(t,   hit.open,  hit.vel, fireOut);
      if (hit.inst === 'tom')   fireTom(t,   hit.pitch, 0.22,     hit.vel, fireOut);
      if (hit.inst === 'rim')   fireRim(t,   hit.vel, fireOut);
      if (hit.inst === 'clap')  fireClap(t,  hit.vel, fireOut);
    });
  };
}

// -- BREAK STYLE 2: JUNGLE / AMEN ---------------------------------------------
// Punchy, forward. Mid-presence EQ + short room air.
function buildDrumBreak_Jungle(terminal, loopBeats, density) {
  const pat       = generateBreakPattern(density);
  const kickPitch = 160 + Math.random() * 40;
  const snareTone = 230 + Math.random() * 50;

  // Mid-presence boost + bright room reverb
  const mid = ctx.createBiquadFilter();
  mid.type = 'peaking'; mid.frequency.value = 1800; mid.gain.value = 6; mid.Q.value = 1.0;
  const hi = ctx.createBiquadFilter();
  hi.type = 'highshelf'; hi.frequency.value = 6000; hi.gain.value = 3;

  const rv    = ctx.createConvolver();
  const rvLen = Math.floor(ctx.sampleRate * 0.14);
  const rvBuf = ctx.createBuffer(2, rvLen, ctx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = rvBuf.getChannelData(ch);
    for (let i = 0; i < rvLen; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / rvLen, 4);
  }
  rv.buffer = rvBuf;
  const rvG   = ctx.createGain(); rvG.gain.value = 0.28;
  const outGain = ctx.createGain(); outGain.gain.value = 1.0;
  outGain.connect(mid); mid.connect(hi); hi.connect(terminal);
  outGain.connect(rv);  rv.connect(rvG); rvG.connect(terminal);

  return function play(time, loopSec, density, drumNode) {
    // Fresh gain for this fire -- will be faded out on next retrigger
    const fireOut = ctx.createGain(); fireOut.gain.value = 1;
    fireOut.connect(outGain);
    if (drumNode) drumNode._drumOutGain = fireOut;
    // Density from loop length: short=8b (jungle), medium=16b, long=32b
    // density 1.0 = double-time 16th grid (jungle bustle)
    // density 0.5 = normal 8th grid
    // density 0.25 = half-time feel
    // Step grid scales with loop length (press duration):
    // 8b  = dense/jungle: 16th note grid, tight swing
    // 16b = normal: 8th note grid, light swing
    // 32b = sparse/halftime: quarter note grid, no swing
    const stepSec = loopBeats <= 8  ? masterBeatSec / 4   // 16th notes -- jungle bustle
                  : loopBeats <= 16 ? masterBeatSec / 2   // 8th notes  -- standard
                  :                   masterBeatSec;       // quarter notes -- halftime
    const swing   = loopBeats <= 8  ? stepSec * 0.14      // pronounced swing when dense
                  : loopBeats <= 16 ? stepSec * 0.06      // light swing
                  :                   0;                   // straight when sparse
    const halfSec = loopSec;
    pat.filter(hit => hit.step * stepSec < halfSec).forEach(hit => {
      const t = time + hit.step * stepSec;
      if (hit.inst === 'kick')  fireKick(t,  kickPitch, 0.22,                         hit.vel, fireOut);
      if (hit.inst === 'snare') fireSnare(t, snareTone, hit.vel > 0.5 ? 0.11 : 0.055, hit.vel, fireOut);
      if (hit.inst === 'hat')   fireHat(t,   hit.open,  hit.vel, fireOut);
      if (hit.inst === 'tom')   fireTom(t,   hit.pitch * 1.1, 0.13,                   hit.vel, fireOut);
      if (hit.inst === 'rim')   fireRim(t,   hit.vel, fireOut);
    });
  };
}

  const kickPitch = 145 + Math.random() * 35;

  const bpf = ctx.createBiquadFilter(); bpf.type = 'bandpass'; bpf.frequency.value = 2000; bpf.Q.value = 0.5;
  const lofiGain = ctx.createGain(); lofiGain.gain.value = 0.6;
  const dryGain  = ctx.createGain(); dryGain.gain.value  = 0.5;
  const outGain  = ctx.createGain(); outGain.gain.value  = 1.1;
  outGain.connect(dryGain); dryGain.connect(terminal);
  outGain.connect(bpf); bpf.connect(lofiGain); lofiGain.connect(terminal);

  return function play(time, loopSec, density, drumNode) {
    // Fresh gain for this fire -- will be faded out on next retrigger
    const fireOut = ctx.createGain(); fireOut.gain.value = 1;
    fireOut.connect(outGain);
    if (drumNode) drumNode._drumOutGain = fireOut;
    // Density from loop length: short=8b (jungle), medium=16b, long=32b
    // density 1.0 = double-time 16th grid (jungle bustle)
    // density 0.5 = normal 8th grid
    // density 0.25 = half-time feel
    // Step grid scales with loop length (press duration):
    // 8b  = dense/jungle: 16th note grid, tight swing
    // 16b = normal: 8th note grid, light swing
    // 32b = sparse/halftime: quarter note grid, no swing
    const stepSec = loopBeats <= 8  ? masterBeatSec / 4   // 16th notes -- jungle bustle
                  : loopBeats <= 16 ? masterBeatSec / 2   // 8th notes  -- standard
                  :                   masterBeatSec;       // quarter notes -- halftime
    const swing   = loopBeats <= 8  ? stepSec * 0.14      // pronounced swing when dense
                  : loopBeats <= 16 ? stepSec * 0.06      // light swing
                  :                   0;                   // straight when sparse
    const halfSec = loopSec;
    pat.filter(hit => hit.step * stepSec < halfSec).forEach(hit => {
      const t = time + hit.step * stepSec;
      if (hit.inst === 'kick')  fireTightKick(t, kickPitch, hit.vel, fireOut);
      if (hit.inst === 'snare') fireClap(t, hit.vel, fireOut);  // claps not snares
      if (hit.inst === 'hat')   fireHat(t, hit.open, hit.vel, fireOut);
      if (hit.inst === 'tom')   fireTom(t, hit.pitch, 0.18, hit.vel, fireOut);
      if (hit.inst === 'rim')   fireRim(t, hit.vel, fireOut);
    });
  };
}

    // Fresh gain for this fire -- will be faded out on next retrigger
    const fireOut = ctx.createGain(); fireOut.gain.value = 1;

    const stepSec = loopBeats <= 8  ? masterBeatSec / 4   // 16th notes -- jungle bustle

    const swing   = loopBeats <= 8  ? stepSec * 0.14      // pronounced swing when dense
                  : loopBeats <= 16 ? stepSec * 0.06      // light swing

    rez.frequency.setValueAtTime(sweepHz, time);

// -- BREAK STYLE 9: FILTER SWEEP -------------------------------------------------
// Resonant filter sweeps across the break in real time.
// Effect: automated lowpass sweep synced to break length, Q builds to peak then releases.
function buildDrumBreak_Filter(terminal, loopBeats, density) {
  const pat       = generateBreakPattern(density);
  const kickPitch = 145 + Math.random() * 35;
  const snareTone = 195 + Math.random() * 50;

  const filt = ctx.createBiquadFilter();
  filt.type = 'lowpass'; filt.frequency.value = 200; filt.Q.value = 6;
  const filt2 = ctx.createBiquadFilter();
  filt2.type = 'highpass'; filt2.frequency.value = 40;
  const outGain = ctx.createGain(); outGain.gain.value = 1.05;
  outGain.connect(filt); filt.connect(filt2); filt2.connect(terminal);

  return function play(time, loopSec, density, drumNode) {
    // Fresh gain for this fire -- will be faded out on next retrigger
    const fireOut = ctx.createGain(); fireOut.gain.value = 1;
    fireOut.connect(outGain);
    if (drumNode) drumNode._drumOutGain = fireOut;
    // Density from loop length: short=8b (jungle), medium=16b, long=32b
    // density 1.0 = double-time 16th grid (jungle bustle)
    // density 0.5 = normal 8th grid
    // density 0.25 = half-time feel
    // Step grid scales with loop length (press duration):
    // 8b  = dense/jungle: 16th note grid, tight swing
    // 16b = normal: 8th note grid, light swing
    // 32b = sparse/halftime: quarter note grid, no swing
    const stepSec = loopBeats <= 8  ? masterBeatSec / 4   // 16th notes -- jungle bustle
                  : loopBeats <= 16 ? masterBeatSec / 2   // 8th notes  -- standard
                  :                   masterBeatSec;       // quarter notes -- halftime
    const swing   = loopBeats <= 8  ? stepSec * 0.14      // pronounced swing when dense
                  : loopBeats <= 16 ? stepSec * 0.06      // light swing
                  :                   0;                   // straight when sparse
    const halfSec = loopSec;

    // Sweep filter from dark to open across the break, then snap back
    filt.frequency.cancelScheduledValues(time);
    filt.frequency.setValueAtTime(120 + Math.random() * 80, time);
    filt.frequency.exponentialRampToValueAtTime(7000 + Math.random() * 4000, time + halfSec * 0.75);
    filt.frequency.exponentialRampToValueAtTime(200, time + halfSec);

    // Resonance builds then releases
    filt.Q.cancelScheduledValues(time);
    filt.Q.setValueAtTime(4, time);
    filt.Q.linearRampToValueAtTime(14 + Math.random() * 8, time + halfSec * 0.5);
    filt.Q.linearRampToValueAtTime(3, time + halfSec);

    pat.filter(hit => hit.step * stepSec < halfSec).forEach(hit => {
      const t = time + hit.step * stepSec;
      if (hit.inst === 'kick')  fireKick(t,  kickPitch, 0.55, hit.vel, fireOut);
      if (hit.inst === 'snare') fireSnare(t, snareTone, hit.vel > 0.5 ? 0.15 : 0.07, hit.vel, fireOut);
      if (hit.inst === 'hat')   fireHat(t,   hit.open,  hit.vel, fireOut);
      if (hit.inst === 'tom')   fireTom(t,   hit.pitch, 0.20,    hit.vel, fireOut);
      if (hit.inst === 'rim')   fireRim(t,   hit.vel, fireOut);
    });
  };
}

// -- ANALOG FAT BASS ----------------------------------------------------------
// Four-oscillator analog bass: two detuned saws + square + deep sine sub.
// Driven into a resonant lowpass with a punchy per-note envelope.
// Glides between notes. Sounds like a Minimoog or Juno bass.
function buildDoubleSawBass(hz, node) {
  const detune     = 10 + Math.random() * 18;   // wide detuning -- thick, chorused
  const filterLo   = 40  + Math.random() * 40;   // starts very closed
  const filterPeak = 1200 + Math.random() * 2400; // sweeps way up -- dramatic
  const filterQ    = 6   + Math.random() * 10;   // high resonance -- screams on sweep
  const sweepTime  = 0.02 + Math.random() * 0.06; // fast attack sweep
  const decayTime  = 0.4  + Math.random() * 0.6;  // slower decay for that dying-away feel
  const glideTime  = 0.015 + Math.random() * 0.03;

  const dest = (node && node.fxIn) ? node.fxIn : (node && node.synthBus) ? node.synthBus : synthBus;

  // -- Oscillators --
  // Two detuned saws for the classic chorus-like width
  const s1 = ctx.createOscillator(); s1.type = 'sawtooth'; s1.frequency.value = hz;
  const s2 = ctx.createOscillator(); s2.type = 'sawtooth'; s2.frequency.value = hz;
  s1.detune.value =  detune;
  s2.detune.value = -detune;

  // Square wave adds odd harmonics and grit (mixed in lightly)
  const sq = ctx.createOscillator(); sq.type = 'square'; sq.frequency.value = hz;
  sq.detune.value = detune * 0.3;
  const sqGain = ctx.createGain(); sqGain.gain.value = 0.28; // more square = more grit

  // Deep sine sub -- one octave down, gives the chest-punch weight
  const sub = ctx.createOscillator(); sub.type = 'sine'; sub.frequency.value = hz / 2;
  const subGain = ctx.createGain(); subGain.gain.value = 0.75;

  if (node) node.detuneNode = s1;

  // -- Mixer --
  const sawMix = ctx.createGain(); sawMix.gain.value = 0.50;

  // -- Pre-filter soft drive -- gives the warm harmonic saturation of an analog filter input
  const drive = ctx.createWaveShaper();
  const dc = new Float32Array(256);
  for (let i = 0; i < 256; i++) {
    const x = (i / 128) - 1;
    dc[i] = Math.tanh(x * 3.5) * 0.78; // harder drive -- more harmonic grit
  }
  drive.curve = dc; drive.oversample = '4x';

  // -- Resonant lowpass filter -- the heart of the sound
  const filt = ctx.createBiquadFilter(); filt.type = 'lowpass';
  filt.frequency.value = filterLo;
  filt.Q.value = filterQ;

  // Second filter pole for steeper rolloff (cascade = 24dB/oct feel)
  const filt2 = ctx.createBiquadFilter(); filt2.type = 'lowpass';
  filt2.frequency.value = filterLo * 1.8;
  filt2.Q.value = 0.7;

  // -- Amp envelope --
  const ampEnv = ctx.createGain(); ampEnv.gain.value = 0;

  // -- Stereo width: short delay on one channel --
  const wideDelay = ctx.createDelay(0.02); wideDelay.delayTime.value = 0.006;
  const wideGain  = ctx.createGain(); wideGain.gain.value = 0.3;

  // -- Proximity filter modulation --
  const proxFilter = ctx.createBiquadFilter(); proxFilter.type = 'lowpass';
  proxFilter.frequency.value = filterLo + 600;
  proxFilter.Q.value = filterQ * 0.6;
  const proxGain = ctx.createGain(); proxGain.gain.value = 1;
  proxFilter.connect(proxGain); proxGain.connect(dest);

  if (node) {
    node.filterNode   = proxFilter;
    node.gainNode     = proxGain;
    node.baseFilterQ  = filterQ;
    node.baseFilterHz = filterLo + 600;
  }

  // -- Signal path --
  s1.connect(sawMix); s2.connect(sawMix);
  sq.connect(sqGain); sqGain.connect(sawMix);
  sawMix.connect(drive);
  sub.connect(subGain); subGain.connect(filt); // sub bypasses drive (stays clean)
  drive.connect(filt);
  filt.connect(filt2);
  filt2.connect(ampEnv);
  ampEnv.connect(proxFilter);
  ampEnv.connect(wideDelay); wideDelay.connect(wideGain); wideGain.connect(proxFilter);

  s1.start(); s2.start(); sq.start(); sub.start();
  if (node) {
    node._bassOscs  = [s1, s2, sq, sub];
    node._bassNodes = { ampEnv, filt, filt2 };
  }

  return function play(time, noteDur, newHz) {
    const freq = newHz || hz;

    // Portamento glide -- schedule at the note's time, not ctx.currentTime
    s1.frequency.setTargetAtTime(freq,      time, glideTime);
    s2.frequency.setTargetAtTime(freq,      time, glideTime);
    sq.frequency.setTargetAtTime(freq,      time, glideTime);
    sub.frequency.setTargetAtTime(freq / 2, time, glideTime);

    const qBoost = node ? node.proximityInfluence * 12 : 0;
    filt.Q.value  = filterQ + qBoost;

    // Filter envelope -- sharp attack sweep, dramatic rise, slow decay
    filt.frequency.setValueAtTime(filterLo, time);
    filt.frequency.linearRampToValueAtTime(filterPeak, time + sweepTime);
    filt.frequency.exponentialRampToValueAtTime(filterLo * 1.8, time + sweepTime + decayTime);
    filt2.frequency.setValueAtTime(filterLo * 2, time);
    filt2.frequency.linearRampToValueAtTime(filterPeak * 1.3, time + sweepTime);
    filt2.frequency.exponentialRampToValueAtTime(filterLo * 2.5, time + sweepTime + decayTime);

    // Amplitude envelope -- hard transient, sustain, long release
    ampEnv.gain.setValueAtTime(0.001, time);
    ampEnv.gain.linearRampToValueAtTime(0.65, time + 0.005); // punchy attack
    ampEnv.gain.exponentialRampToValueAtTime(0.38, time + 0.035);
    ampEnv.gain.setValueAtTime(0.38, time + noteDur * 0.65);
    ampEnv.gain.exponentialRampToValueAtTime(0.001, time + noteDur);
  };
}


// -- ACID BASS ----------------------------------------------------------------
// TB-303 inspired: square/saw + tight resonant filter with pitch slides
function buildAcidBass(hz, node) {
  const acidHz = hz;
  const filterStart = 80 + Math.random() * 100;
  const filterPeak  = 400 + Math.random() * 1200;
  const resonance   = 8 + Math.random() * 12;
  const slideTime   = 0.04 + Math.random() * 0.06;

  return function play(time, noteDur) {
    const dest = (node && node.fxIn) ? node.fxIn : (node && node.synthBus) ? node.synthBus : synthBus;
    const osc = ctx.createOscillator();
    osc.type = Math.random() > 0.4 ? 'sawtooth' : 'square';
    // Pitch slide up from below (portamento feel)
    osc.frequency.setValueAtTime(acidHz * 0.94, time);
    osc.frequency.linearRampToValueAtTime(acidHz, time + slideTime);

    const filt = ctx.createBiquadFilter(); filt.type = 'lowpass';
    filt.Q.value = resonance;
    filt.frequency.setValueAtTime(filterStart, time);
    filt.frequency.exponentialRampToValueAtTime(filterPeak, time + 0.05 + Math.random()*0.05);
    filt.frequency.exponentialRampToValueAtTime(filterStart * 1.5, time + noteDur * 0.6);

    const env = ctx.createGain();
    env.gain.setValueAtTime(0, time);
    env.gain.linearRampToValueAtTime(0.38, time + 0.005);
    env.gain.exponentialRampToValueAtTime(0.001, time + noteDur * 0.85);

    osc.connect(filt); filt.connect(env); env.connect(dest);
    osc.start(time); osc.stop(time + noteDur + 0.05);
  };
}

// -- SAW LEAD -----------------------------------------------------------------
// Sparse melodic fill -- two saws + ping-pong delay, no sirening
function buildSawLead(hz, node) {
  const detune = 6 + Math.random() * 8;
  const filterBase = 500 + Math.random() * 500;
  const filterUp   = filterBase * (1.8 + Math.random() * 1.5);

  return function play(time, noteDur) {
    const dest = (node && node.fxIn) ? node.fxIn : (node && node.synthBus) ? node.synthBus : synthBus;
    const s1 = ctx.createOscillator(); s1.type = 'sawtooth'; s1.frequency.value = hz;
    const s2 = ctx.createOscillator(); s2.type = 'sawtooth'; s2.frequency.value = hz;
    s1.detune.value =  detune; s2.detune.value = -detune;

    const filt = ctx.createBiquadFilter(); filt.type = 'lowpass';
    filt.Q.value = 2 + Math.random() * 3;
    filt.frequency.setValueAtTime(filterBase, time);
    filt.frequency.linearRampToValueAtTime(filterUp, time + noteDur * 0.35);
    filt.frequency.exponentialRampToValueAtTime(filterBase, time + noteDur);

    const env = ctx.createGain();
    env.gain.setValueAtTime(0, time);
    env.gain.linearRampToValueAtTime(0.2, time + 0.015);
    env.gain.setValueAtTime(0.2, time + noteDur * 0.6);
    env.gain.exponentialRampToValueAtTime(0.001, time + noteDur);

    const beatSec = 60 / bpm;
    const dL = ctx.createDelay(1); dL.delayTime.value = beatSec * 0.5;
    const dR = ctx.createDelay(1); dR.delayTime.value = beatSec * 0.75;
    const fbL = ctx.createGain(); fbL.gain.value = 0.3;
    const fbR = ctx.createGain(); fbR.gain.value = 0.25;
    const wetGain = ctx.createGain(); wetGain.gain.value = 0.22;

    s1.connect(filt); s2.connect(filt);
    filt.connect(env);
    env.connect(dest);
    env.connect(dL); dL.connect(fbR); fbR.connect(dR); dR.connect(fbL); fbL.connect(dL);
    dL.connect(wetGain); dR.connect(wetGain); wetGain.connect(dest);

    s1.start(time); s2.start(time);
    s1.stop(time + noteDur + 0.5); s2.stop(time + noteDur + 0.5);
  };
}

// -- ARP SYSTEM ---------------------------------------------------------------
// Bass position controls melody with clear musical axes:
//   Y axis: top = melodically complex (more notes, wider intervals, syncopated)
//            bottom = simple (fewer notes, root-focused, repetitive)
//   X axis: slides through available scale degrees within the current complexity
//            left = lower/root-centred notes, right = higher/colourful notes

let arpSlotCounter = 0;
let arpBassOffset  = 0;

// Scale degrees available (semitones above root, within bass range)
// Indexed so left=low/root, right=high/colourful
const BASS_DEGREE_POOL = [0, 2, 3, 5, 7, 8, 10, 12, 14, 15];

function buildPositionalArp(nx, ny) {
  const scale    = SCALES[scaleType];
  const rootMidi = 28 + Math.round(12 * Math.log2(rootHz / 41.2));

  const yPos     = 1 - ny;
  const numNotes = Math.max(3, Math.round(3 + yPos * 5)); // 3..8

  // Build pool across 3 octaves in bass register
  const allNotes = [];
  for (let oct = 0; oct <= 3; oct++)
    for (const deg of scale) {
      const m = rootMidi + oct * 12 + deg;
      if (m >= 24 && m <= 60) allNotes.push(m);
    }
  allNotes.sort((a, b) => a - b);

  // X shifts register window, Y shifts upward
  const xOffset = Math.floor(nx * (allNotes.length - numNotes));
  const yOffset = Math.floor(yPos * 5);
  const start   = Math.max(0, Math.min(allNotes.length - numNotes, xOffset + yOffset));
  const pool    = allNotes.slice(start, start + numNotes);
  if (pool.length < 2) return [midiToHz(rootMidi + 12)];

  const n = pool.length;
  const lo = pool[0], hi = pool[n - 1], mid = pool[Math.floor(n / 2)];

  // 8 patterns across X -- each inspired by a different musical tradition
  const zone = Math.floor(nx * 8);
  let pattern;

  switch (zone) {
    case 0:
      // Steve Reich / minimalist: short cell that shifts by one each time
      // e.g. [0,2,4] then [1,3,5] -- we give one rotated instance
      pattern = [...pool.slice(0, Math.min(4, n))];
      // Rotate by 1 to give displaced feel
      pattern = [...pattern.slice(1), pattern[0]];
      break;

    case 1:
      // Jazz: chord tones with chromatic approach note before resolution
      // Root -> 4th -> flat7 -> 3rd (sus resolution)
      pattern = [
        pool[0],
        pool[Math.min(3, n-1)],
        pool[Math.min(n-2, n-1)],
        pool[Math.min(2, n-1)],
        pool[Math.min(5, n-1)],
        pool[1],
      ].slice(0, numNotes);
      break;

    case 2:
      // Afrobeat / funk: syncopated cells, repeating root with upper note stabs
      pattern = [lo, mid, lo, lo, hi, mid, lo, pool[Math.min(2,n-1)]].slice(0, numNotes);
      break;

    case 3:
      // Modal / Coltrane: wide interval jumps, fourths and fifths
      pattern = [];
      for (let i = 0; i < numNotes; i++) {
        // Alternate between low and a fourth/fifth up
        const base = pool[i % Math.ceil(n / 2)];
        const leap = pool[Math.min(Math.ceil(n / 2) + i % Math.floor(n / 2), n - 1)];
        pattern.push(i % 2 === 0 ? base : leap);
      }
      break;

    case 4:
      // Boards of Canada / IDM: descending with one unexpected high note
      pattern = [...pool].reverse();
      // Insert a high note at position 2 for surprise
      if (pattern.length >= 4) pattern.splice(2, 0, hi);
      pattern = pattern.slice(0, numNotes);
      break;

    case 5:
      // Gamelan / world: pentatonic-feel skips (1-3-5-4-2-1)
      pattern = [
        pool[0],
        pool[Math.min(2, n-1)],
        pool[Math.min(4, n-1)],
        pool[Math.min(3, n-1)],
        pool[Math.min(1, n-1)],
        pool[0],
      ].slice(0, numNotes);
      break;

    case 6:
      // Drum & bass / jungle: fast low note anchor with high stabs
      pattern = [];
      for (let i = 0; i < numNotes; i++) {
        if (i % 3 === 0) pattern.push(lo);
        else pattern.push(pool[Math.min(n - 1 - (i % Math.max(1, n - 2)), n - 1)]);
      }
      break;

    default: // case 7
      // Classical / baroque: sequence -- same shape transposed up by step
      const shape = [0, 2, 1]; // step up, step back
      pattern = [];
      for (let i = 0; i < numNotes; i++) {
        const base = Math.floor(i / shape.length);
        const pos  = Math.min(base + shape[i % shape.length], n - 1);
        pattern.push(pool[pos]);
      }
      break;
  }

  return pattern.map(midi => midiToHz(midi));
}

// Stub kept for compatibility
function buildArpSequence(hz, slotIndex) {
  return buildPositionalArp(0.3, 0.5);
}

const BASS_ARP_PATTERNS = [[0,3,5,3],[0,5,3,0],[0,2,3,2],[0,3,0,5],[5,3,0,2],[0,0,3,5]];
const ARP_PATTERNS = BASS_ARP_PATTERNS;
const CHORD_ROLES  = [0, 7, 3, 10, 5, 2, 7, 3];

// Snap a MIDI note to the nearest degree of the current scale
function snapToScale(midi, rootMidi, scale) {
  const octave     = Math.floor((midi - rootMidi) / 12);
  const semitone   = ((midi - rootMidi) % 12 + 12) % 12;
  // Find nearest scale degree
  const nearest    = scale.reduce((best, deg) =>
    Math.abs(deg - semitone) < Math.abs(best - semitone) ? deg : best
  );
  return rootMidi + octave * 12 + nearest;
}

// --- NODE / LOOP SYSTEM ------------------------------------------------------

let masterOriginTime = null; // ctx.currentTime when first node fires -- all nodes lock to this
let beatTimerRef = null;
const SCHEDULER_AHEAD    = 0.25;  // 250ms lookahead -- safely larger than interval jank
const SCHEDULER_INTERVAL = 40;    // 40ms tick

// Each node fires every node.loopBeats beats (its own loop length)
// The scheduler advances a beat-accurate clock and fires nodes at their intervals

function schedulerTick() {
  if (!ctx || nodes.length === 0) return;
  const now = ctx.currentTime;
  const lookAheadUntil = now + SCHEDULER_AHEAD;

  // Walk forward in time scheduling events
  // We track each node's nextFireTime independently
  nodes.forEach(node => {
    while (node.nextFireTime < lookAheadUntil) {
      const t = node.nextFireTime;
      node.fire(t);
      node.nextFireTime += node.loopSec;
    }
  });
}

function startScheduler() {
  if (beatTimerRef) clearInterval(beatTimerRef);
  beatTimerRef = setInterval(schedulerTick, SCHEDULER_INTERVAL);
}

// Convert a raw press duration (seconds) into a quantized loop length in beats
// First press: snap to nearest musical beat count (1,2,4,8,16 bars * 4 beats)
// Subsequent: snap to nearest musical fraction/multiple of masterLoopBeats
const BEAT_SNAPS = [0.25, 0.5, 1, 2, 4, 8, 16, 32];

function snapToBeats(rawSec) {
  const rawBeats = rawSec / masterBeatSec;
  // Find closest value in BEAT_SNAPS
  return BEAT_SNAPS.reduce((best, b) =>
    Math.abs(b - rawBeats) < Math.abs(best - rawBeats) ? b : best
  );
}

function snapFirstLoop(rawSec) {
  // For the first loop, raw press sec IS the loop. Snap BPM so the loop
  // lands on a musical beat count from BEAT_SNAPS.
  // We target ~120bpm as default feel, then adjust.
  const targetBPMs = [70,80,85,90,95,100,105,110,115,120,125,128,130,140];
  // Try each BPM, find which one makes rawSec snap cleanest to a BEAT_SNAP
  let bestBPM = 120, bestBeats = 4, bestErr = Infinity;
  targetBPMs.forEach(b => {
    const beatSec = 60 / b;
    const rawBeats = rawSec / beatSec;
    const snapped = BEAT_SNAPS.reduce((best, s) =>
      Math.abs(s - rawBeats) < Math.abs(best - rawBeats) ? s : best
    );
    const err = Math.abs(snapped - rawBeats);
    if (err < bestErr) { bestErr = err; bestBPM = b; bestBeats = snapped; }
  });
  return { bpm: bestBPM, loopBeats: bestBeats };
}

const canvas = document.getElementById('c');
const gfx = canvas.getContext('2d');
let W, H;

function resize() {

  H = canvas.height = window.innerHeight;
